version: "3"

tasks:
  default:
    cmds:
      - task: build

  build:
    desc: Build the atlasctl binary
    cmds:
      - go build -o bin/atlasctl .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - bin/atlasctl

  build-release:
    desc: Build atlasctl with ldflags version injection
    vars:
      VERSION: '{{.VERSION | default "dev"}}'
    cmds:
      - go build -ldflags "-X github.com/aldoshkineg/atlas-idp/tools/atlasctl/cmd.Version={{.VERSION}}" -o bin/atlasctl .
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - bin/atlasctl

  test:
    desc: Run unit tests with race detection
    cmds:
      - go test -race -count=1 -coverprofile=coverage.out ./...

  test-integration:
    desc: Run integration tests (requires running cluster)
    cmds:
      - go test -tags=integration -count=1 ./...

  cover:
    desc: Run tests and open coverage report
    cmds:
      - task: test
      - go tool cover -html=coverage.out

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run staticcheck
    cmds:
      - staticcheck ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/ coverage.out coverage/

  tidy:
    desc: Tidy go module dependencies
    cmds:
      - go mod tidy
