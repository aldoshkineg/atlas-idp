apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: readonly
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: atlas-idp
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["*"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: readonly
  labels:
    app.kubernetes.io/component: rbac
    app.kubernetes.io/part-of: atlas-idp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: readonly
subjects:
  - kind: Group
    name: atlas:readonly
    apiGroup: rbac.authorization.k8s.io
