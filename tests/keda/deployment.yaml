apiVersion: apps/v1
kind: Deployment
metadata:
  name: keda-fast-test
  namespace: keda-test
spec:
  replicas: 0
  selector:
    matchLabels:
      app: keda-fast-test
  template:
    metadata:
      labels:
        app: keda-fast-test
    spec:
      containers:
        - name: alpine
          image: alpine:3.19
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
