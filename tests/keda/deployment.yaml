apiVersion: apps/v1
kind: Deployment
metadata:
  name: keda-fast-test
  namespace: keda-test
spec:
  replicas: 0
  selector:
    matchLabels:
      app: keda-fast-test
  template:
    metadata:
      labels:
        app: keda-fast-test
    spec:
      containers:
        - name: pause
          image: busybox:1.36
          command:
            - sleep
            - "3600"
