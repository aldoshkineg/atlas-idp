apiVersion: v1
kind: Pod
metadata:
  name: seal-test
  namespace: atlasteam-seal
  labels:
    app.kubernetes.io/component: test
    app.kubernetes.io/part-of: seal
spec:
  containers:
    - name: curl
      image: curlimages/curl:8.12.0
      command: ["/bin/sleep", "3600"]
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi
  restartPolicy: Never
