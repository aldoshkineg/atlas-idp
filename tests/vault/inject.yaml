---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: test-vault-inject
  namespace: testing
---
apiVersion: v1
kind: Pod
metadata:
  name: vault-inject-test
  namespace: testing
  annotations:
    vault.security.banzaicloud.io/vault-role: "platform-read"
    vault.security.banzaicloud.io/vault-skip-verify: "true"
    vault.security.banzaicloud.io/vault-agent: "true"
    vault.security.banzaicloud.io/vault-agent-once: "true"
    vault.security.banzaicloud.io/vault-configmap: "vault-agent-cm"
    vault.security.banzaicloud.io/vault-agent-configmap: "vault-agent-cm"
    vault.security.banzaicloud.io/vault-ignore-missing-secrets: "true"
spec:
  serviceAccountName: test-vault-inject
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "=== Vault secrets ==="
          cat /vault/secrets/* || true
          sleep 3600
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
