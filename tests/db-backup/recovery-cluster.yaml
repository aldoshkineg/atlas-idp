apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: test-db-recovery
  namespace: db-backup-test
  labels:
    app: db-backup-test
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.6
  primaryUpdateStrategy: unsupervised
  storage:
    size: 256Mi
    storageClass: csi-hostpath-sc
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  monitoring:
    enablePodMonitor: false
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: false
      parameters:
        barmanObjectName: test-backup-store
  bootstrap:
    recovery:
      source: test-db-source