apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: test-backup-store
  namespace: db-backup-test
spec:
  configuration:
    destinationPath: s3://cnpg-backups/
    endpointURL: http://minio.minio.svc.cluster.local:9000
    s3Credentials:
      accessKeyId:
        key: ACCESS_KEY_ID
        name: backup-creds
      secretAccessKey:
        key: ACCESS_SECRET_KEY
        name: backup-creds
    wal:
      compression: gzip
      maxParallel: 2
  retentionPolicy: 7d
