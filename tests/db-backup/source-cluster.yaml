apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: test-db-source
  namespace: db-backup-test
  labels:
    app: db-backup-test
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.6
  primaryUpdateStrategy: unsupervised
  storage:
    size: 256Mi
    storageClass: linstor-replicated
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  monitoring:
    enablePodMonitor: false
  postgresql:
    parameters:
      max_connections: "50"
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters:
        barmanObjectName: test-backup-store
