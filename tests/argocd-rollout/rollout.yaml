apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: test-rollout
  namespace: argocd-rollout-test
spec:
  replicas: 4
  selector:
    matchLabels:
      app: test-rollout
  template:
    metadata:
      labels:
        app: test-rollout
    spec:
      containers:
        - name: test-rollout
          image: ghcr.io/aldoshkineg/pause:3.10-amd64
          ports:
            - containerPort: 80
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause:
            duration: 10
        - setWeight: 50
        - pause:
            duration: 10
        - setWeight: 100
