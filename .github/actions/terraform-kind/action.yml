name: Terraform Kind
description: "Deploy KinD cluster via Terraform"
inputs:
  atlas_ca_crt:
    description: "CA certificate for dev cluster"
    required: false
  atlas_ca_key:
    description: "CA key for dev cluster"
    required: false
runs:
  using: composite
  steps:
    - name: Terraform Init
      shell: bash
      working-directory: ./infra/environments/dev
      env:
        TF_PLUGIN_CACHE_DIR: /opt/terraform/plugin-cache
      run: |
        mkdir -p /opt/terraform/plugin-cache
        n=0
        until [ "$n" -ge 3 ]; do
          terraform init -reconfigure && break
          n=$((n+1))
          echo "Terraform init failed. Retry $n/3"
          sleep 15
        done
        [ "$n" -lt 3 ] || exit 1

    - name: Remove stale cluster from state
      shell: bash
      working-directory: ./infra/environments/dev
      run: |
        mkdir -p /root/.kube

        if kind get clusters 2>/dev/null | grep -q "^atlas-idp$"; then
          echo "Kind cluster 'atlas-idp' found locally."
        else
          echo "Kind cluster 'atlas-idp' not found locally. Removing from Terraform state."
          terraform state rm module.kind_cluster.kind_cluster.default[0] 2>/dev/null || true
        fi

    - name: Terraform Plan
      shell: bash
      working-directory: ./infra/environments/dev
      env:
        TF_PLUGIN_CACHE_DIR: /opt/terraform/plugin-cache
      run: terraform plan -lock-timeout=5m -refresh=false -out=tfplan

    - name: Terraform Apply
      shell: bash
      working-directory: ./infra/environments/dev
      env:
        KUBECONFIG: /root/.kube/kind
        TF_PLUGIN_CACHE_DIR: /opt/terraform/plugin-cache
      run: terraform apply -auto-approve tfplan

    - name: Check cluster
      shell: bash
      env:
        KUBECONFIG: /root/.kube/kind
      run: |
        kubectl cluster-info
        kubectl get nodes

    - name: Wait nodes
      shell: bash
      env:
        KUBECONFIG: /root/.kube/kind
      run: |
        kubectl wait --for=condition=Ready node --all --timeout=300s

    - name: Create CA Secret for cert-manager
      shell: bash
      env:
        KUBECONFIG: /root/.kube/kind
      run: |
        kubectl create namespace cert-manager --dry-run=client -o yaml | kubectl apply -f -
        kubectl create secret tls atlas-ca-secret \
        --cert=<(echo "${{ inputs.atlas_ca_crt }}") \
        --key=<(echo "${{ inputs.atlas_ca_key }}") \
        -n cert-manager \
        --dry-run=client -o yaml | kubectl apply -f -

    - name: Verify ArgoCD
      shell: bash
      env:
        KUBECONFIG: /root/.kube/kind
      run: |
        kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=180s

        echo "=== Waiting for root-app sync (budget 180s) ==="
        kubectl wait --for=condition=available deployment/argocd-repo-server -n argocd --timeout=120s

        for i in $(seq 1 30); do
          ERROR=$(kubectl get application root-app -n argocd \
            -o jsonpath='{.status.conditions[?(@.type=="ComparisonError")].message}' 2>/dev/null)
          SYNC=$(kubectl get application root-app -n argocd \
            -o jsonpath='{.status.sync.status}' 2>/dev/null)
          echo "[$i] sync-status=$SYNC"

          if [ -n "$SYNC" ] && [ -z "$ERROR" ]; then
            echo "root-app synced successfully"
            break
          fi

          if [ -n "$ERROR" ]; then
            echo "ComparisonError — triggering hard refresh..."
            kubectl patch application root-app -n argocd --type merge \
              -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}'
          fi

          if [ "$i" -eq 30 ]; then
            echo "TIMEOUT waiting for root-app sync"
            kubectl describe application root-app -n argocd
            exit 1
          fi
          sleep 6
        done
        kubectl get applications -n argocd
