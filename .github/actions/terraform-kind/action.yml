name: Terraform Kind
description: "Deploy KinD cluster via Terraform"

runs:
  using: composite
  steps:
    - name: Terraform Init
      shell: bash
      working-directory: ./infra/environments/dev
      env:
        TF_PLUGIN_CACHE_DIR: /opt/terraform/plugin-cache
      run: |
        n=0
        until [ "$n" -ge 3 ]; do
          terraform init && break
          n=$((n+1))
          echo "Terraform init failed. Retry $n/3"
          sleep 15
        done
        [ "$n" -lt 3 ] || exit 1

    - name: Terraform Plan
      shell: bash
      working-directory: ./infra/environments/dev
      env:
        TF_PLUGIN_CACHE_DIR: /opt/terraform/plugin-cache
      run: terraform plan -lock-timeout=5m -out=tfplan

    - name: Terraform Apply
      shell: bash
      working-directory: ./infra/environments/dev
      env:
        KUBECONFIG: /root/.kube/kind
        TF_PLUGIN_CACHE_DIR: /opt/terraform/plugin-cache
      run: terraform apply -auto-approve tfplan

    - name: Check cluster
      shell: bash
      env:
        KUBECONFIG: /root/.kube/kind
      run: |
        kubectl cluster-info
        kubectl get nodes

    - name: Wait nodes
      shell: bash
      env:
        KUBECONFIG: /root/.kube/kind
      run: |
        kubectl wait --for=condition=Ready node --all --timeout=300s

    - name: Create CA Secret for cert-manager
      shell: bash
      env:
        KUBECONFIG: /root/.kube/kind
      run: |
        kubectl create namespace cert-manager --dry-run=client -o yaml | kubectl apply -f -
        kubectl create secret tls dev-ca-secret \
        --cert=<(echo "${{ inputs.dev_ca_crt }}") \
        --key=<(echo "${{ inputs.dev_ca_key }}") \
        -n cert-manager \
        --dry-run=client -o yaml | kubectl apply -f -

    - name: Verify ArgoCD
      shell: bash
      env:
        KUBECONFIG: /root/.kube/kind
      run: |
        kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=180s
        kubectl get applications -n argocd
