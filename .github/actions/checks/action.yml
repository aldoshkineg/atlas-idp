name: Base Checks
description: "Run base checks and linters"

runs:
  using: composite
  steps:
    - name: Terraform Format
      shell: bash
      run: terraform fmt -check -recursive infra/

    - name: Terraform Validate
      shell: bash
      working-directory: infra/environments/dev
      env:
        TF_PLUGIN_CACHE_DIR: /opt/terraform/plugin-cache
      run: |
        mkdir -p /opt/terraform/plugin-cache
        terraform init -backend=false
        terraform validate

    - name: Install yamllint
      shell: bash
      run: pip install yamllint

    - name: YAML Lint
      shell: bash
      run: |
        yamllint -c .yamllint.yml gitops/ observability/ security/

    - name: Security Scan
      shell: bash
      run: |
        trivy config --severity HIGH,CRITICAL infra/
        trivy config --severity HIGH,CRITICAL gitops/
