name: Base Checks
description: "Run base checks and linters"

runs:
  using: composite
  steps:
    - name: Terraform Format
      shell: bash
      run: terraform fmt -check -recursive infra/

    - name: Terraform Validate
      shell: bash
      env:
        TF_PLUGIN_CACHE_DIR: /opt/terraform/plugin-cache
      run: |
        mkdir -p /opt/terraform/plugin-cache
        for env in dev stage; do
          echo "=== Validating infra/environments/$env ==="
          terraform -chdir=infra/environments/$env init -backend=false
          terraform -chdir=infra/environments/$env validate
        done

    - name: Install yamllint
      shell: bash
      env:
        YAMLLINT_VERSION_FILE: .github/actions/tools/action.yml
      run: |
        yamllint_version="$(awk -F'[:"]+' '/YAMLLINT_VERSION/ {print $3; exit}' "$YAMLLINT_VERSION_FILE")"

        if ! command -v yamllint; then
          .github/scripts/install-tools.sh yamllint "$yamllint_version"
        fi

    - name: YAML Lint
      shell: bash
      run: |
        yamllint -c .yamllint.yml gitops/ observability/ security/

    - name: Security Scan
      shell: bash
      run: |
        trivy config --config security/trivy/trivy.yaml --severity HIGH,CRITICAL infra/
        trivy config --config security/trivy/trivy.yaml --severity HIGH,CRITICAL gitops/
