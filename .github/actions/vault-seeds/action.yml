name: Vault Seeds
description: "Seed platform secrets into Vault"

inputs:
  vault_token:
    description: "Vault token used by CI to seed platform secrets"
    required: false
  vl_minio_root_user:
    description: "MinIO root user for Vault"
    required: true
  vl_minio_root_password:
    description: "MinIO root password for Vault"
    required: true
  vl_redis_password:
    description: "Redis password for Vault"
    required: true

runs:
  using: composite
  steps:
    - name: Seed platform secrets to Vault
      shell: bash
      env:
        VAULT_TOKEN: ${{ inputs.vault_token }}
        VAULT_WAIT_TOTAL_TIMEOUT: 180
        VL_MINIO_ROOT_USER: ${{ inputs.vl_minio_root_user }}
        VL_MINIO_ROOT_PASSWORD: ${{ inputs.vl_minio_root_password }}
        VL_REDIS_PASSWORD: ${{ inputs.vl_redis_password }}
      run: |
        echo "===> Resolving Vault token..."
        export KUBECONFIG="${KUBECONFIG:-${HOME}/.kube/kind}"
        unset VAULT_ADDR

        if [ -z "${VAULT_ADDR:-}" ] && kubectl -n vault get secret vault-unseal-keys >/dev/null 2>&1; then
          export VAULT_TOKEN="$(kubectl -n vault get secret vault-unseal-keys -o jsonpath='{.data.vault-root}' | base64 -d)"
          echo "Using Vault root token from vault-unseal-keys"
        fi

        seed_file="$(mktemp)"
        trap 'rm -f "$seed_file"' EXIT
        cat > "$seed_file" <<EOF
        secret/platform/minio rootUser=${VL_MINIO_ROOT_USER}
        secret/platform/minio rootPassword=${VL_MINIO_ROOT_PASSWORD}
        secret/platform/redis redis-password=${VL_REDIS_PASSWORD}
        EOF

        echo "===> Waiting for Vault availability..."
        ./security/vault/wait-vault.sh
        echo "===> Creating External Secrets Vault token Secret..."
        ./security/vault/bootstrap-eso-token.sh
        echo "===> Seeding platform secrets..."
        ./security/vault/seed-platform.sh seed "$seed_file"
        echo "===> Verifying seeded data..."
        ./security/vault/seed-platform.sh verify "$seed_file"
        rm -f "$seed_file"
        echo "===> Vault seed complete"
