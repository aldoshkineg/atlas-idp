name: Vault Seeds
description: "Seed platform secrets into Vault"

inputs:
  vl_minio_root_user:
    description: "MinIO root user for Vault"
    required: true
  vl_minio_root_password:
    description: "MinIO root password for Vault"
    required: true
  vl_redis_password:
    description: "Redis password for Vault"
    required: true
  vl_grafana_password:
    description: "Grafana admin password for Vault"
    required: true

runs:
  using: composite
  steps:
    - name: Seed platform secrets to Vault
      shell: bash
      env:
        VAULT_WAIT_TOTAL_TIMEOUT: 600
        VL_MINIO_ROOT_USER: ${{ inputs.vl_minio_root_user }}
        VL_MINIO_ROOT_PASSWORD: ${{ inputs.vl_minio_root_password }}
        VL_REDIS_PASSWORD: ${{ inputs.vl_redis_password }}
        VL_GRAFANA_PASSWORD: ${{ inputs.vl_grafana_password }}
      run: |
        unset VAULT_ADDR
        export KUBECONFIG="${KUBECONFIG:-${HOME}/.kube/kind}"
        export VAULT_TOKEN="$(kubectl -n vault get secret vault-unseal-keys -o jsonpath='{.data.vault-root}' | base64 -d)"

        echo "===> Waiting for Vault availability..."
        ./security/vault/wait-vault.sh
        echo "===> Creating External Secrets Vault token Secret..."
        ./security/vault/bootstrap-eso-token.sh
        echo "===> Seeding platform secrets..."
        ./security/vault/seed-from-env.sh
