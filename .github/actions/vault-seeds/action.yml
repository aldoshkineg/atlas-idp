name: Vault Seeds
description: "Seed platform secrets into Vault and wait for dependent ArgoCD apps"

inputs:
  vault_token:
    description: "Vault token used by CI to seed platform secrets"
    required: false
  vl_minio_root_user:
    description: "MinIO root user for Vault"
    required: true
  vl_minio_root_password:
    description: "MinIO root password for Vault"
    required: true
  vl_redis_password:
    description: "Redis password for Vault"
    required: true
  argo_timeout:
    description: "Timeout for each ArgoCD Application wait"
    required: false
    default: 900s
  app_wait_attempts:
    description: "Attempts to wait for ArgoCD Applications to appear"
    required: false
    default: "60"

runs:
  using: composite
  steps:
    - name: Seed platform secrets to Vault
      shell: bash
      env:
        VAULT_TOKEN: ${{ inputs.vault_token }}
        VL_MINIO_ROOT_USER: ${{ inputs.vl_minio_root_user }}
        VL_MINIO_ROOT_PASSWORD: ${{ inputs.vl_minio_root_password }}
        VL_REDIS_PASSWORD: ${{ inputs.vl_redis_password }}
      run: |
        export KUBECONFIG="${KUBECONFIG:-${HOME}/.kube/kind}"

        if [ -z "${VAULT_ADDR:-}" ] && kubectl -n vault get secret vault-unseal-keys >/dev/null 2>&1; then
          export VAULT_TOKEN="$(kubectl -n vault get secret vault-unseal-keys -o jsonpath='{.data.vault-root}' | base64 -d)"
          echo "Using Vault root token from vault-unseal-keys"
        fi

        seed_file="$(mktemp)"
        trap 'rm -f "$seed_file"' EXIT
        cat > "$seed_file" <<EOF
        secret/platform/minio rootUser=${VL_MINIO_ROOT_USER}
        secret/platform/minio rootPassword=${VL_MINIO_ROOT_PASSWORD}
        secret/platform/redis redis-password=${VL_REDIS_PASSWORD}
        EOF

        ./security/vault/wait-vault.sh
        ./security/vault/bootstrap-eso-token.sh
        ./security/vault/seed-platform.sh seed "$seed_file"
        rm -f "$seed_file"

    - name: Continue waiting ArgoCD apps
      shell: bash
      env:
        ARGO_TIMEOUT: ${{ inputs.argo_timeout }}
        APP_WAIT_ATTEMPTS: ${{ inputs.app_wait_attempts }}
      run: |
        export KUBECONFIG="${KUBECONFIG:-${HOME}/.kube/kind}"

        wait_for_argocd_application() {
          local app="$1"

          for _ in $(seq 1 "${APP_WAIT_ATTEMPTS}"); do
            if kubectl -n argocd get application "$app" >/dev/null 2>&1; then
              kubectl -n argocd wait --for=condition=Healthy "application/$app" --timeout="${ARGO_TIMEOUT}"
              return $?
            fi
            sleep 10
          done

          echo "Application '$app' was not created" >&2
          return 1
        }

        wait_for_argocd_application external-secrets
        wait_for_argocd_application minio
        wait_for_argocd_application redis
