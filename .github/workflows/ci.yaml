name: Platform CI

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

  workflow_dispatch:

jobs:
  ci:
    runs-on: [self-hosted]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/tools

      - uses: ./.github/actions/checks

      - uses: ./.github/actions/terraform-kind
        with:
          dev_ca_crt: ${{ secrets.DEV_CA_CRT }}
          dev_ca_key: ${{ secrets.DEV_CA_KEY }}

      - uses: ./.github/actions/vault-seeds
        with:
          vault_token: ${{ secrets.VAULT_TOKEN }}
          vl_minio_root_user: ${{ secrets.VL_MINIO_ROOT_USER }}
          vl_minio_root_password: ${{ secrets.VL_MINIO_ROOT_PASSWORD }}
          vl_redis_password: ${{ secrets.VL_REDIS_PASSWORD }}
          vl_grafana_password: ${{ secrets.VL_GRAFANA_PASSWORD }}

      - uses: ./.github/actions/terraform-eks
        if: false
