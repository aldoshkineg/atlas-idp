name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Check Terraform
      run: terraform version

    - name: Terraform Format Check
      run: terraform fmt -check -recursive infra/ || echo "Warning: Terraform files need formatting"

    - name: Terraform Validate
      run: |
        cd infra/environments/dev
        terraform init -backend=false
        terraform validate

    - name: Install yamllint
      run: pip install yamllint || true

    - name: YAML Lint
      run: yamllint -c .yamllint.yml gitops/ observability/ security/ || true

    - name: Trivy Security Scan
      run: |
        if command -v trivy &> /dev/null; then
          trivy config --severity HIGH,CRITICAL infra/ gitops/ || true
        else
          echo "Trivy not installed, skipping"
        fi
