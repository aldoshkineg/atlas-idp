name: CI Pipeline

on:
  push:
    branches: [main]
  merge_group:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CLUSTER_NAME: atlas-idp
  CI_CLUSTER_NAME: atlas-idp-ci
  KIND_CONFIG: clusters/kind/cluster-ci.yaml
  TF_ROOT: infra/environments/local-kind

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: [self-hosted, atlas-idp, kind, local]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9

      - name: Terraform Init
        run: |
          cd ${{ env.TF_ROOT }}
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd ${{ env.TF_ROOT }}
          terraform validate

      - name: Terraform Format Check
        run: |
          terraform fmt -check -recursive ../../

  trivy-iac:
    name: Trivy IaC Scan
    runs-on: [self-hosted, atlas-idp, kind, local]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy IaC
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          exit-code: '1'
          severity: HIGH,CRITICAL
          config: security/trivy/trivy.yaml
          ignore-unfixed: true

  trivy-images:
    name: Trivy Image Scan
    runs-on: [self-hosted, atlas-idp, kind, local]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: apps/
          exit-code: '1'
          severity: HIGH,CRITICAL
          config: security/trivy/trivy.yaml
          ignore-unfixed: true

  build-apps:
    name: Build App Images
    runs-on: [self-hosted, atlas-idp, kind, local]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Info
        run: docker info

      - name: Build App Images
        run: |
          echo "Build app images (backend-api, worker) — add Dockerfiles under apps/"

  kind-create:
    name: Create Kind Cluster
    runs-on: [self-hosted, atlas-idp, kind, local]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          apk add --no-cache bash curl
          chmod +x clusters/scripts/*.sh
          ./clusters/scripts/ci-install-tools.sh

      - name: Create Kind Cluster
        run: ./clusters/scripts/ci-kind-provision.sh

  kind-verify:
    name: Verify Kind Cluster
    runs-on: [self-hosted, atlas-idp, kind, local]
    timeout-minutes: 5
    needs: kind-create
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          apk add --no-cache bash curl
          chmod +x clusters/scripts/*.sh
          ./clusters/scripts/ci-install-tools.sh

      - name: Smoke Test
        run: ./clusters/scripts/ci-kind-smoke.sh

  kind-delete:
    name: Delete Kind Cluster
    runs-on: [self-hosted, atlas-idp, kind, local]
    if: always()
    timeout-minutes: 5
    needs:
      - kind-create
      - kind-verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          apk add --no-cache bash curl
          chmod +x clusters/scripts/*.sh
          ./clusters/scripts/ci-install-tools.sh

      - name: Delete Kind Cluster
        run: ./clusters/scripts/ci-kind-down.sh

  deploy-gitops-sync:
    name: Deploy GitOps Sync
    runs-on: [self-hosted, atlas-idp, kind, local]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GitOps Sync
        run: |
          echo "Argo CD sync — configure ARGOCD_SERVER / ARGOCD_AUTH_TOKEN in secrets"
