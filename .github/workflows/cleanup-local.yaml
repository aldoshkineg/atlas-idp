name: Manual Cleanup KinD

on:
  workflow_dispatch:

jobs:
  cleanup:
    name: Aggressive Cleanup
    runs-on: [self-hosted]

    defaults:
      run:
        working-directory: ./infra/environments/dev

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run local tools action
        uses: ./.github/actions/tools

      - name: Verify kind
        run: kind version

      - name: Remove Zot cache container
        run: |
          echo "Removing Zot cache container..."
          docker rm -f kind-zot-registry 2>/dev/null || true

      - name: Delete KinD cluster
        run: |
          echo "Deleting KinD cluster..."
          kind delete cluster --name atlas-idp || true

      - name: Wipe local state
        run: |
          echo "Removing local Terraform state..."
          rm -rf /var/tmp/atlas/terraform

          echo "State wiped"

      - name: Clean local artifacts
        run: |
          echo "Removing Terraform local state and artifacts..."
          rm -rf \
            .terraform \
            .terraform.lock.hcl \
            terraform.tfstate* \
            /var/tmp/atlas/terraform

          echo "Cleanup completed"
