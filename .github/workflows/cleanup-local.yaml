name: Manual Cleanup KinD

on:
  workflow_dispatch:

jobs:
  cleanup:
    name: Aggressive Cleanup

    needs: tools

    runs-on: [self-hosted]

    defaults:
      run:
        working-directory: ./infra/environments/dev

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run local tools action
        uses: ./.github/actions/tools

      - name: Verify kind
        run: kind version

      - name: Run Aggressive Cleanup
        run: |
          echo "Aggressive cleanup of existing resources..."

          echo "Deleting KinD cluster..."
          kind delete cluster --name atlas-idp || true

          echo "Removing Terraform local state and artifacts..."
          rm -rf \
            .terraform \
            .terraform.lock.hcl \
            terraform.tfstate* \
            /var/tmp/atlas-idp-cluster.tfstate

          echo "Cleanup completed"
