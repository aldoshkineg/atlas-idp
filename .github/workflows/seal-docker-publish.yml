name: Seal - Build and Publish Docker Images

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: aldoshkineg

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [seal-api, seal-worker, seal-ui]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate dev tag
        id: dev-tag
        if: github.event_name == 'workflow_dispatch'
        run: echo "tag=dev-$(date +%Y%m%d-%H%M)" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.ORG }}/${{ matrix.service }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ steps.dev-tag.outputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/seal/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        env:
          COSIGN_PASSWORD: ""
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          for img in $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' '); do
            echo "Signing ${img}"
            cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${img}"
          done
