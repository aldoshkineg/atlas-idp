name: CI Base

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      ATLAS_CA_CRT:
        required: true
      ATLAS_CA_KEY:
        required: true
      VL_MINIO_ROOT_USER:
        required: true
      VL_MINIO_ROOT_PASSWORD:
        required: true
      VL_REDIS_PASSWORD:
        required: true
      VL_GRAFANA_PASSWORD:
        required: true

# Canonical "base" stage: tools + checks + terraform (incus) apply + vault seeds.
# Reused by ci-all.yaml via `uses:`. To promote it to the primary push/PR
# trigger instead of the orchestrator, add:
#   push: { branches: [main] }
#   pull_request: { branches: [main] }

jobs:
  base:
    runs-on: [self-hosted]

    env:
      KUBECONFIG: /var/tmp/atlas/talos/kubeconfig

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/tools

      - uses: ./.github/actions/checks

      - uses: ./.github/actions/terraform-incus
        with:
          atlas_ca_crt: ${{ secrets.ATLAS_CA_CRT }}
          atlas_ca_key: ${{ secrets.ATLAS_CA_KEY }}

      - uses: ./.github/actions/vault-seeds
        with:
          vl_minio_root_user: ${{ secrets.VL_MINIO_ROOT_USER }}
          vl_minio_root_password: ${{ secrets.VL_MINIO_ROOT_PASSWORD }}
          vl_redis_password: ${{ secrets.VL_REDIS_PASSWORD }}
          vl_grafana_password: ${{ secrets.VL_GRAFANA_PASSWORD }}
