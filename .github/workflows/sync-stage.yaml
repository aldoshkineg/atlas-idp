name: Sync Stage Layers

on:
  workflow_dispatch:
    inputs:
      phase:
        description: "Stage phase to sync (all | middleware | workloads)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - middleware
          - workloads
  # Optional: run automatically after stage apply
  # workflow_run:
  #   workflows: ["Deploy Stage"]   # name of your act-stage-base workflow
  #   types: [completed]

jobs:
  sync:
    runs-on: [self-hosted]

    env:
      KUBECONFIG: /var/tmp/atlas/talos/kubeconfig

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: ./.github/actions/tools

      - name: Sync ArgoCD layers sequentially
        shell: bash
        run: |
          chmod +x ./tools/ci/sync-layers.sh
          ./tools/ci/sync-layers.sh "${PHASE:-${{ github.event.inputs.phase || 'all' }}}"
