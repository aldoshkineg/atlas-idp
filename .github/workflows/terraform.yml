name: Terraform Deploy KinD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  terraform:
    name: Terraform Apply
    runs-on: self-hosted # Используем ваш self-hosted раннер c лейблом из настроек

    env:
      KUBECONFIG: /root/.kube/kind

    defaults:
      run:
        working-directory: ./infra/environments/dev

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.15.3"
        terraform_wrapper: false # Отключаем wrapper для корректной передачи sensitive-данных в outputs

    - name: Setup kubectl
      run: |
        if ! command -v kubectl &> /dev/null; then
          echo "Installing kubectl..."
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
        fi
        kubectl version --client

    - name: Setup kind
      run: |
        if ! command -v kind &> /dev/null; then
          echo "Installing kind..."
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.29.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
        fi
        kind version

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan

    - name: Terraform Apply
      run: terraform apply -auto-approve

    - name: Check K8s Cluster Connection
      run: |
        echo "Checking cluster connectivity..."
        kubectl cluster-info
        echo ""
        echo "Nodes status:"
        kubectl get nodes -o wide

    - name: Check Core Components
      run: |
        echo "Checking kube-system pods:"
        kubectl get pods -n kube-system
        echo ""
        echo "Checking all namespaces:"
        kubectl get namespaces

    - name: Wait for Nodes Ready
      run: |
        echo "Waiting for nodes to be ready..."
        for i in {1..30}; do
          READY_NODES=$(kubectl get nodes --no-headers 2>/dev/null | grep -c " Ready" || echo "0")
          TOTAL_NODES=$(kubectl get nodes --no-headers 2>/dev/null | wc -l)
          echo "Attempt $i: $READY_NODES/$TOTAL_NODES nodes ready"
          if [ "$READY_NODES" = "$TOTAL_NODES" ] && [ "$TOTAL_NODES" -gt 0 ]; then
            echo "All nodes are ready!"
            kubectl get nodes -o wide
            exit 0
          fi
          sleep 10
        done
        echo "Timeout waiting for nodes to be ready"
        kubectl get nodes -o wide
        exit 1

    - name: Verify Argo CD Bootstrap
      run: |
        echo "=== Verifying Argo CD installation ==="
        echo "Waiting for Argo CD server deployment..."
        kubectl wait --for=condition=available deployment/argocd-server \
          -n argocd --timeout=180s

        echo ""
        echo "Argo CD pods status:"
        kubectl get pods -n argocd

        echo ""
        echo "Argo CD Applications:"
        kubectl get applications -n argocd

        echo ""
        echo "Root Application status:"
        kubectl describe application root-platform -n argocd || echo "Root app not yet synced"

        echo ""
        echo "=== Argo CD Bootstrap Complete ==="
        echo "Access Argo CD UI: http://localhost:30080"
        echo "Username: admin"
        echo "Get password: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d"
