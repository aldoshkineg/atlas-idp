name: Terraform Deploy KinD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  terraform:
    name: Terraform Apply
    runs-on: self-hosted # Используем ваш self-hosted раннер c лейблом из настроек

    env:
      KUBECONFIG: /root/.kube/kind

    defaults:
      run:
        # Укажите точный путь до папки с вашим main.tf относительно корня репозитория
        working-directory: ./infra/environments/dev/

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.15.3"
        terraform_wrapper: false # Отключаем wrapper для корректной передачи sensitive-данных в outputs

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan

    - name: Terraform Apply
      run: terraform apply -auto-approve

    - name: Setup kubectl
      run: |
        if ! command -v kubectl &> /dev/null; then
          echo "Installing kubectl..."
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
        fi
        kubectl version --client

    - name: Check K8s Cluster Connection
      run: |
        echo "Checking cluster connectivity..."
        kubectl cluster-info
        echo ""
        echo "Nodes status:"
        kubectl get nodes -o wide

    - name: Check Core Components
      run: |
        echo "Checking kube-system pods:"
        kubectl get pods -n kube-system
        echo ""
        echo "Checking all namespaces:"
        kubectl get namespaces
