name: Terraform Deploy KinD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  terraform:
    name: Terraform Apply
    runs-on: self-hosted # Используем ваш self-hosted раннер c лейблом из настроек

    env:
      KUBECONFIG: /root/.kube/kind

    defaults:
      run:
        # Укажите точный путь до папки с вашим main.tf относительно корня репозитория
        working-directory: ./infra/environments/dev/

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.15.3"
        terraform_wrapper: false # Отключаем wrapper для корректной передачи sensitive-данных в outputs

    - name: Terraform Init
      run: terraform init

    - name: Cleanup Existing Cluster
      run: |
        echo "Aggressive cleanup of existing resources..."
        # Delete cluster via kind if exists
        kind delete cluster --name dev-cluster 2>/dev/null || echo "No cluster to delete via kind"
        # Remove all terraform state files
        rm -rf .terraform/ terraform.tfstate terraform.tfstate.backup .terraform.lock.hcl
        echo "Cleanup completed"
        # Re-init terraform from scratch
        terraform init

    - name: Terraform Plan
      run: terraform plan

    - name: Terraform Apply
      run: terraform apply -auto-approve

    - name: Setup kubectl
      run: |
        if ! command -v kubectl &> /dev/null; then
          echo "Installing kubectl..."
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
        fi
        kubectl version --client

    - name: Setup kind
      run: |
        if ! command -v kind &> /dev/null; then
          echo "Installing kind..."
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.29.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
        fi
        kind version

    - name: Check K8s Cluster Connection
      run: |
        echo "Checking cluster connectivity..."
        kubectl cluster-info
        echo ""
        echo "Nodes status:"
        kubectl get nodes -o wide

    - name: Check Core Components
      run: |
        echo "Checking kube-system pods:"
        kubectl get pods -n kube-system
        echo ""
        echo "Checking all namespaces:"
        kubectl get namespaces

    - name: Wait for Nodes Ready
      run: |
        echo "Waiting for nodes to be ready..."
        for i in {1..30}; do
          READY_NODES=$(kubectl get nodes --no-headers 2>/dev/null | grep -c " Ready" || echo "0")
          TOTAL_NODES=$(kubectl get nodes --no-headers 2>/dev/null | wc -l)
          echo "Attempt $i: $READY_NODES/$TOTAL_NODES nodes ready"
          if [ "$READY_NODES" = "$TOTAL_NODES" ] && [ "$TOTAL_NODES" -gt 0 ]; then
            echo "All nodes are ready!"
            kubectl get nodes -o wide
            exit 0
          fi
          sleep 10
        done
        echo "Timeout waiting for nodes to be ready"
        kubectl get nodes -o wide
        exit 1

    - name: Terraform Destroy
      if: always()
      run: terraform destroy -auto-approve
