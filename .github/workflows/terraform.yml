name: Terraform

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

env:
  TF_ROOT: infra/environments/local-kind

jobs:
  validate:
    name: Terraform Validate
    runs-on: [self-hosted, atlas-idp, kind, local]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9

      - name: Terraform Init
        run: |
          cd ${{ env.TF_ROOT }}
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd ${{ env.TF_ROOT }}
          terraform validate

      - name: Terraform Format
        run: terraform fmt -check -recursive ../../
