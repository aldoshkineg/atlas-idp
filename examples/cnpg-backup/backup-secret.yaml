# S3 backup credentials for CloudNativePG barman-cloud plugin.
# Uses MinIO credentials — dev only. Do NOT commit real credentials.
# TODO: migrate to Vault + external-secrets operator.
apiVersion: v1
kind: Secret
metadata:
  name: production-db-backup
  namespace: database
type: Opaque
stringData:
  ACCESS_KEY_ID: minioadmin
  ACCESS_SECRET_KEY: minioadminpassword