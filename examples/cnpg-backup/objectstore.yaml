# ObjectStore defines the S3 backup destination for a CNPG cluster.
# The cluster must reference this via spec.plugins[].parameters.barmanObjectName.
# Requires a Secret "production-db-backup" in the same namespace with MinIO credentials.
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: production-db-backup
  namespace: database
spec:
  configuration:
    destinationPath: s3://cnpg-backups/
    endpointURL: http://minio.minio.svc.cluster.local:9000
    s3Credentials:
      accessKeyId:
        key: ACCESS_KEY_ID
        name: production-db-backup
      secretAccessKey:
        key: ACCESS_SECRET_KEY
        name: production-db-backup
    wal:
      compression: gzip
      maxParallel: 2
  retentionPolicy: 7d