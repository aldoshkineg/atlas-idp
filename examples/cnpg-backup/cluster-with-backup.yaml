# CNPG Cluster with barman-cloud plugin for S3 backup.
# Apply with: kubectl apply -f examples/cnpg-backup/cluster-with-backup.yaml
# Requires ObjectStore and Secret from this directory to be present.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: production-db
  namespace: database
spec:
  instances: 1

  imageName: ghcr.io/cloudnative-pg/postgresql:17.6

  primaryUpdateStrategy: unsupervised

  storage:
    size: 256Mi
    storageClass: csi-hostpath-sc

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

  monitoring:
    enablePodMonitor: false

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"

  # Enables WAL archiving to S3 via the barman-cloud plugin.
  # References the ObjectStore CR "production-db-backup" for S3 config and credentials.
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters:
        barmanObjectName: production-db-backup