apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: seal-alerts
  namespace: seal
spec:
  groups:
    - name: seal
      rules:
        - alert: SEAL_HighErrorRate
          expr: |
            rate(http_requests_total{app="seal", status=~"5.."}[5m]) /
            rate(http_requests_total{app="seal"}[5m]) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High error rate on Seal API"
            description: "Error rate > 5% for 5 minutes"
