apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: seal-db
  namespace: seal
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: seal-db
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - seal
