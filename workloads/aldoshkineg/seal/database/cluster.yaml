apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: seal-db
  namespace: seal
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: seal
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.6
  primaryUpdateStrategy: unsupervised
  storage:
    size: 256Mi
    storageClass: csi-hostpath-sc
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  monitoring:
    enablePodMonitor: false
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "64MB"
  bootstrap:
    initdb:
      database: seal
      owner: seal
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      enabled: true
      isWALArchiver: true
      parameters:
        barmanObjectName: seal-db-backup
