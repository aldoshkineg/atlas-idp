apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seal
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "100"
    argocd.argoproj.io/depends-on: seal-infra
spec:
  project: workloads
  source:
    repoURL: https://github.com/aldoshkineg/atlas-idp-seal.git
    targetRevision: HEAD
    path: charts/seal
    helm:
      values: |
        vault:
          enabled: true
        secrets:
          postgresPassword: ""
          redisPassword: ""
          minioAccessKey: ""
          minioSecretKey: ""
  destination:
    server: https://kubernetes.default.svc
    namespace: seal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
