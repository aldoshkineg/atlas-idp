apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: testapp-keda-redis-auth
  namespace: testgroup-testapp
  annotations:
    argocd.argoproj.io/sync-wave: "135"
spec:
  secretTargetRef:
    - parameter: password
      name: testapp-worker-secret
      key: REDIS_PASSWORD
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: testapp-worker
  namespace: testgroup-testapp
  annotations:
    argocd.argoproj.io/sync-wave: "136"
spec:
  scaleTargetRef:
    name: testapp-worker
  minReplicaCount: 0
  maxReplicaCount: 20
  pollingInterval: 10
  cooldownPeriod: 60
  triggers:
    - type: redis
      metadata:
        address: redis-master.redis.svc.cluster.local:6379
        listName: "testapp:jobs"
        listLength: "1"
        enableTLS: "false"
      authenticationRef:
        name: testapp-keda-redis-auth
