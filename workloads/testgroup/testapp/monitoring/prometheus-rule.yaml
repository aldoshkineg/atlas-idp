apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: testapp-alerts
  namespace: testgroup-testapp
spec:
  groups:
    - name: testapp
      rules:
        - alert: TESTGROUP_TESTAPP_HighErrorRate
          expr: |
            rate(http_requests_total{app="testapp", status=~"5.."}[5m]) /
            rate(http_requests_total{app="testapp"}[5m]) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High error rate on testapp"
            description: "Error rate > 5% for 5 minutes"
