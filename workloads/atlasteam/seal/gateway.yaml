apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seal-route
  namespace: atlasteam-seal
spec:
  parentRefs:
    - name: platform-gateway
      namespace: nginx-gateway-fabric
      sectionName: https-seal
  hostnames:
    - seal.atlas
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/
      backendRefs:
        - name: seal-api
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: seal-ui
          port: 8081
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: seal-cert
  namespace: atlasteam-seal
spec:
  secretName: seal-tls
  issuerRef:
    name: atlas-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - seal.atlas
