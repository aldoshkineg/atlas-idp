apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: seal-keda-redis-auth
  namespace: atlasteam-seal
  annotations:
    argocd.argoproj.io/sync-wave: "135"
spec:
  secretTargetRef:
    - parameter: password
      name: seal-worker-secret
      key: REDIS_PASSWORD
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: seal-worker
  namespace: atlasteam-seal
  annotations:
    argocd.argoproj.io/sync-wave: "136"
spec:
  scaleTargetRef:
    name: seal-worker
  minReplicaCount: 1
  maxReplicaCount: 20
  pollingInterval: 10
  cooldownPeriod: 60
  triggers:
    - type: redis
      metadata:
        address: redis-master.redis.svc.cluster.local:6379
        listName: "seal:jobs"
        listLength: "1"
        enableTLS: "false"
      authenticationRef:
        name: seal-keda-redis-auth
