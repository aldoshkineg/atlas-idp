# Mapping for atlasteam/seal workload secrets
# Format: <vault-path> <key>=<ENV_VAR_NAME>
#   _B64 suffix = atlasctl will base64-decode before writing
# Only secrets — static config (host, port, endpoint) comes from Helm values.yaml
secret/workloads/atlasteam/seal  db_password=VL_ATLASTEAM_SEAL_DB_PASSWORD
secret/workloads/atlasteam/seal  s3_access_key=VL_ATLASTEAM_SEAL_S3_ACCESS_KEY
secret/workloads/atlasteam/seal  s3_secret_key=VL_ATLASTEAM_SEAL_S3_SECRET_KEY
secret/workloads/atlasteam/seal  redis_password=VL_ATLASTEAM_SEAL_REDIS_PASSWORD
# PDF signing cert — separate path for B64 handling by atlasctl seed
secret/workloads/atlasteam/seal-cert  tls.crt=VL_ATLASTEAM_SEAL_PDF_CERT_B64
secret/workloads/atlasteam/seal-cert  tls.key=VL_ATLASTEAM_SEAL_PDF_KEY_B64
