---
# Database credentials — shared production-db (CNPG)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: test2-db
  namespace: atlasteam-test2
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: test2-db
  data:
    - secretKey: username
      remoteRef:
        key: secret/workloads/atlasteam/test2
        property: db_username
    - secretKey: password
      remoteRef:
        key: secret/workloads/atlasteam/test2
        property: db_password
    - secretKey: host
      remoteRef:
        key: secret/workloads/atlasteam/test2
        property: db_host
    - secretKey: port
      remoteRef:
        key: secret/workloads/atlasteam/test2
        property: db_port
    - secretKey: dbname
      remoteRef:
        key: secret/workloads/atlasteam/test2
        property: db_name
---
# S3 credentials — shared MinIO
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: test2-s3
  namespace: atlasteam-test2
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: test2-s3
  data:
    - secretKey: accessKey
      remoteRef:
        key: secret/workloads/atlasteam/test2
        property: s3_access_key
    - secretKey: secretKey
      remoteRef:
        key: secret/workloads/atlasteam/test2
        property: s3_secret_key
    - secretKey: endpoint
      remoteRef:
        key: secret/workloads/atlasteam/test2
        property: s3_endpoint
    - secretKey: bucket
      remoteRef:
        key: secret/workloads/atlasteam/test2
        property: s3_bucket
---
# Redis credentials — shared Redis cluster
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: test2-redis
  namespace: atlasteam-test2
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: test2-redis
  data:
    - secretKey: password
      remoteRef:
        key: secret/workloads/atlasteam/test2
        property: redis_password
    - secretKey: host
      remoteRef:
        key: secret/workloads/atlasteam/test2
        property: redis_host
    - secretKey: port
      remoteRef:
        key: secret/workloads/atlasteam/test2
        property: redis_port
