# Mapping for atlas-team/seal workload secrets
# Format: <vault-path> <key>=<ENV_VAR_NAME>
# Only secrets — static config (host, port, endpoint) comes from Helm values.yaml
secret/workloads/atlas-team/seal  db_password=VL_ATLAS_TEAM_SEAL_DB_PASSWORD
secret/workloads/atlas-team/seal  s3_access_key=VL_ATLAS_TEAM_SEAL_S3_ACCESS_KEY
secret/workloads/atlas-team/seal  s3_secret_key=VL_ATLAS_TEAM_SEAL_S3_SECRET_KEY
secret/workloads/atlas-team/seal  redis_password=VL_ATLAS_TEAM_SEAL_REDIS_PASSWORD
