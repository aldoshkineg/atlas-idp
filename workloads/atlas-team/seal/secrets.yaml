---
# Database credentials — shared production-db (CNPG)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: seal-db
  namespace: atlas-team-seal
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: seal-db
  data:
    - secretKey: username
      remoteRef:
        key: secret/workloads/atlas-team/seal
        property: db_username
    - secretKey: password
      remoteRef:
        key: secret/workloads/atlas-team/seal
        property: db_password
    - secretKey: host
      remoteRef:
        key: secret/workloads/atlas-team/seal
        property: db_host
    - secretKey: port
      remoteRef:
        key: secret/workloads/atlas-team/seal
        property: db_port
    - secretKey: dbname
      remoteRef:
        key: secret/workloads/atlas-team/seal
        property: db_name
---
# S3 credentials — shared MinIO
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: seal-s3
  namespace: atlas-team-seal
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: seal-s3
  data:
    - secretKey: accessKey
      remoteRef:
        key: secret/workloads/atlas-team/seal
        property: s3_access_key
    - secretKey: secretKey
      remoteRef:
        key: secret/workloads/atlas-team/seal
        property: s3_secret_key
    - secretKey: endpoint
      remoteRef:
        key: secret/workloads/atlas-team/seal
        property: s3_endpoint
    - secretKey: bucket
      remoteRef:
        key: secret/workloads/atlas-team/seal
        property: s3_bucket
---
# Redis credentials — shared Redis cluster
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: seal-redis
  namespace: atlas-team-seal
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: seal-redis
  data:
    - secretKey: password
      remoteRef:
        key: secret/workloads/atlas-team/seal
        property: redis_password
    - secretKey: host
      remoteRef:
        key: secret/workloads/atlas-team/seal
        property: redis_host
    - secretKey: port
      remoteRef:
        key: secret/workloads/atlas-team/seal
        property: redis_port
