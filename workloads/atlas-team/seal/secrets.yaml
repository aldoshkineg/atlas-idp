---
# API credentials — merges DB + Redis into seal-api-secret (consumed by Helm chart)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: seal-api-secret
  namespace: atlas-team-seal
  annotations:
    argocd.argoproj.io/sync-wave: "110"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: seal-api-secret
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: secret/workloads/atlas-team/seal
        property: db_password
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: secret/workloads/atlas-team/seal
        property: redis_password
---
# Worker credentials — merges MinIO + Redis into seal-worker-secret (consumed by Helm chart)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: seal-worker-secret
  namespace: atlas-team-seal
  annotations:
    argocd.argoproj.io/sync-wave: "110"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: seal-worker-secret
  data:
    - secretKey: MINIO_ACCESS_KEY
      remoteRef:
        key: secret/workloads/atlas-team/seal
        property: s3_access_key
    - secretKey: MINIO_SECRET_KEY
      remoteRef:
        key: secret/workloads/atlas-team/seal
        property: s3_secret_key
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: secret/workloads/atlas-team/seal
        property: redis_password
