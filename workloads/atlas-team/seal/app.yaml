apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seal
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "100"
spec:
  project: workloads
  source:
    repoURL: https://github.com/aldoshkineg/atlas-idp.git
    targetRevision: HEAD
    path: apps/seal/charts/seal
    helm:
      values: |
        global:
          imageRegistry: ghcr.io/aldoshkineg
        images:
          api:
            tag: v0.25.0
          worker:
            tag: v0.25.0
          ui:
            tag: v0.25.0
        vault:
          enabled: false
        secrets:
          create: false
  destination:
    server: https://kubernetes.default.svc
    namespace: atlas-team-seal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
