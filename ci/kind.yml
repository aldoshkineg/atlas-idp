# Local runner: create kind cluster and verify it is Ready.
# Tags: atlas-idp, kind, local

.kind:local:
  stage: kind
  image: docker:27-cli
  tags:
    - atlas-idp
    - kind
    - local
  resource_group: local-kind
  variables:
    CLUSTER_NAME: atlas-idp-ci
    KIND_CONFIG: clusters/kind/cluster-ci.yaml
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - apk add --no-cache bash curl
    - chmod +x clusters/scripts/*.sh
    - ./clusters/scripts/ci-install-tools.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"

kind:create:
  extends: .kind:local
  script:
    - ./clusters/scripts/ci-kind-provision.sh
  timeout: 15m

kind:verify:
  extends: .kind:local
  needs:
    - kind:create
  script:
    - ./clusters/scripts/ci-kind-smoke.sh
  timeout: 5m

kind:delete:
  extends: .kind:local
  needs:
    - job: kind:create
      optional: true
    - job: kind:verify
      optional: true
  when: always
  script:
    - ./clusters/scripts/ci-kind-down.sh
  timeout: 5m
