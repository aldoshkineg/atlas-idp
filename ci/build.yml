build:apps:
  stage: build
  image: docker:27-cli
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  script:
    - docker info
    - echo "Build app images (backend-api, worker) — add Dockerfiles under apps/"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - apps/**/*
