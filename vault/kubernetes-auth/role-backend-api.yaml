# Example Kubernetes auth role for backend-api workload
# Apply after Vault is running and kubernetes auth is enabled.
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-auth-backend-api-stub
  namespace: vault
data:
  role: backend-api
  policies: platform-read
  bound_service_account_names: backend-api
  bound_service_account_namespaces: workloads
