version: "3"

tasks:
  # ────────────────────────────────────────────
  # Default
  # ────────────────────────────────────────────

  default:
    cmd: go-task --list

  # ────────────────────────────────────────────
  # Docker Compose (tests/integration)
  # ────────────────────────────────────────────

  dc-up:
    desc: Start full stack (postgres, redis, minio, alloy, tempo, grafana, seal-api, seal-worker, seal-ui)
    dir: tests/integration
    cmds:
      - docker compose up -d

  dc-down:
    desc: Stop and remove all containers
    dir: tests/integration
    cmds:
      - docker compose down

  dc-logs:
    desc: Follow container logs
    dir: tests/integration
    cmds:
      - docker compose logs -f

  dc-ps:
    desc: List running containers
    dir: tests/integration
    cmds:
      - docker compose ps

  dc-restart:
    desc: Restart all containers
    dir: tests/integration
    cmds:
      - docker compose restart

  # ────────────────────────────────────────────
  # Certificates
  # ────────────────────────────────────────────

  gen-certs:
    desc: Generate self-signed certs for local dev signing (needed by run-worker)
    cmds:
      - mkdir -p .certs
      - >-
        openssl req -x509 -newkey rsa:2048
        -keyout .certs/tls.key -out .certs/tls.crt
        -days 365 -nodes
        -subj "/CN=seal-worker-dev/O=Atlas IDP Local"
      - chmod 644 .certs/tls.crt .certs/tls.key

  # ────────────────────────────────────────────
  # Run Services on Host (requires dc-up)
  # ────────────────────────────────────────────

  run-api:
    desc: Start seal API on host (requires dc-up)
    dir: seal-api
    cmds:
      - go run ./cmd
    env:
      POSTGRES_PASSWORD: seal
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadminpassword
      DOWNLOAD_URL_PREFIX: http://localhost:9000

  run-worker:
    desc: Start seal worker on host (requires dc-up, gen-certs)
    dir: seal-worker
    cmds:
      - go run ./cmd
    env:
      SIGN_CERT_PATH: "{{.TASKFILE_DIR}}/.certs/tls.crt"
      SIGN_KEY_PATH: "{{.TASKFILE_DIR}}/.certs/tls.key"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadminpassword

  run-frontend:
    desc: Start seal UI on host (requires dc-up + run-api)
    dir: seal-ui
    cmds:
      - go run ./cmd
    env:
      BACKEND_API_URL: http://localhost:8080

  # ────────────────────────────────────────────
  # Testing (all Go modules)
  # ────────────────────────────────────────────

  test:
    desc: Run all unit tests in all modules
    cmds:
      - cd seal-api && go test ./... -race -shuffle=on -count=1
      - cd seal-worker && go test ./... -race -shuffle=on -count=1
      - cd seal-ui && go test ./... -race -shuffle=on -count=1

  test-integration:
    desc: Run Go integration tests in both modules (requires dc-up)
    cmds:
      - cd seal-api && go test ./... -tags=integration -race -shuffle=on -count=1
      - cd seal-worker && go test ./... -tags=integration -race -shuffle=on -count=1

  test-infra:
    desc: Run infrastructure smoke tests (curl against docker compose)
    dir: tests/integration
    cmds:
      - ./test-infra.sh

  # ────────────────────────────────────────────
  # Load Testing (k6 — Docker)
  # ────────────────────────────────────────────

  test-load-smoke:
    desc: Run k6 smoke test (1 VU, 10 iterations)
    dir: tests/load
    cmds:
      - bash k6/run.sh smoke

  test-load:
    desc: Run k6 load test (ramp-up to 50 VUs, 4min)
    dir: tests/load
    cmds:
      - bash k6/run.sh load

  test-load-stress:
    desc: Run k6 stress test (step to 100 VUs)
    dir: tests/load
    cmds:
      - bash k6/run.sh stress

  test-load-soak:
    desc: Run k6 soak test (20 VUs, 5min)
    dir: tests/load
    cmds:
      - bash k6/run.sh soak

  # ────────────────────────────────────────────
  # Lint / Vet / Validate (both Go modules)
  # ────────────────────────────────────────────

  lint:
    desc: Run golangci-lint in all modules
    cmds:
      - cd seal-api && golangci-lint run ./...
      - cd seal-worker && golangci-lint run ./...
      - cd seal-ui && golangci-lint run ./...

  vet:
    desc: Run go vet in all modules
    cmds:
      - cd seal-api && go vet ./...
      - cd seal-worker && go vet ./...
      - cd seal-ui && go vet ./...

  validate:
    desc: Run lint, vet, and unit tests
    cmds:
      - task: lint
      - task: vet
      - task: test

  # ────────────────────────────────────────────
  # Build (Docker images)
  # ────────────────────────────────────────────

  build-api:
    desc: Build seal-api Docker image
    cmds:
      - docker buildx build --load -t ghcr.io/atlas-idp/seal-api:dev ./seal-api

  build-worker:
    desc: Build seal-worker Docker image
    cmds:
      - docker buildx build --load -t ghcr.io/atlas-idp/seal-worker:dev ./seal-worker

  build-frontend:
    desc: Build seal-ui Docker image
    cmds:
      - docker buildx build --load -t ghcr.io/atlas-idp/seal-ui:dev ./seal-ui

  build-all:
    desc: Build all Docker images
    cmds:
      - task: build-api
      - task: build-worker
      - task: build-frontend

  act-build:
    desc: Build all images via act (GitHub Actions locally)
    cmds:
      - task: act-build-service
        vars: { SERVICE: seal-api }
      - task: act-build-service
        vars: { SERVICE: seal-worker }
      - task: act-build-service
        vars: { SERVICE: seal-ui }

  act-build-service:
    internal: true
    silent: true
    dir: ../..
    cmds:
      - act workflow_dispatch -W .github/workflows/seal-docker-publish.yml --secret-file .env --matrix "service:{{.SERVICE}}"

  kind-load:
    desc: Load dev images into kind cluster
    deps:
      - build-all
    cmds:
      - kind load docker-image ghcr.io/atlas-idp/seal-api:dev
      - kind load docker-image ghcr.io/atlas-idp/seal-worker:dev
      - kind load docker-image ghcr.io/atlas-idp/seal-ui:dev

  push-images:
    desc: Tag dev images and push to GHCR (tag from current git commit)
    vars:
      TAG:
        sh: git describe --tags --abbrev=0 2>/dev/null || echo "dev"
    cmds:
      - |
        echo "Pushing as ghcr.io/aldoshkineg/seal-*:{{.TAG}}"
        TOKEN=$(grep '^GITHUB_TOKEN=' ../../.env | head -1 | cut -d= -f2)
        echo "$TOKEN" | docker login ghcr.io -u aldoshkineg --password-stdin
      - task: push-image
        vars: { SERVICE: seal-api, TAG: "{{.TAG}}" }
      - task: push-image
        vars: { SERVICE: seal-worker, TAG: "{{.TAG}}" }
      - task: push-image
        vars: { SERVICE: seal-ui, TAG: "{{.TAG}}" }

  push-image:
    internal: true
    silent: true
    vars:
      TAG: '{{.TAG | default "dev"}}'
    cmds:
      - |
        docker tag ghcr.io/atlas-idp/{{.SERVICE}}:dev ghcr.io/aldoshkineg/{{.SERVICE}}:{{.TAG}}
        docker push ghcr.io/aldoshkineg/{{.SERVICE}}:{{.TAG}}

  # ────────────────────────────────────────────
  # Cleanup
  # ────────────────────────────────────────────

  clean:
    desc: Stop compose, remove .certs, and clean go build cache
    cmds:
      - task: dc-down
      - rm -rf .certs
      - go clean -cache
