<div class="bg-white rounded-lg shadow p-6">
    <div class="flex items-center mb-4">
        <svg class="w-6 h-6 text-green-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
        <span class="text-green-700 font-medium">PDF generated successfully!</span>
    </div>
    <div class="space-y-3">
        <a href="/documents/{{.DocumentID}}/download"
           class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            Download PDF
        </a>
        <button hx-get="/documents/{{.DocumentID}}/verify" hx-target="#verify-result" hx-swap="innerHTML"
                class="inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            Verify Signature
        </button>
    </div>
    <div id="verify-result" class="mt-4"></div>
</div>
