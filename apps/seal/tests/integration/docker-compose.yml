services:
  postgres:
    image: postgres:17-alpine
    container_name: seal-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seal}
      POSTGRES_DB: ${POSTGRES_DB:-seal}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-seal} -d ${POSTGRES_DB:-seal}",
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: seal-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadminpassword}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  seal-migrate:
    image: ghcr.io/atlas-idp/seal-api:dev
    container_name: seal-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-seal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seal}
      POSTGRES_DB: ${POSTGRES_DB:-seal}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: ["migrate"]

  seal-worker:
    image: ghcr.io/atlas-idp/seal-worker:dev
    container_name: seal-worker
    restart: unless-stopped
    ports:
      - "9090:9090"
    depends_on:
      minio-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadminpassword}
      MINIO_USE_SSL: false
      WORKER_POLL_INTERVAL_MS: 1000
      SIGN_CERT_PATH: /etc/seal/certs/tls.crt
      SIGN_KEY_PATH: /etc/seal/certs/tls.key
    volumes:
      - ../../.certs/tls.crt:/etc/seal/certs/tls.crt:ro
      - ../../.certs/tls.key:/etc/seal/certs/tls.key:ro

  seal-api:
    image: ghcr.io/atlas-idp/seal-api:dev
    container_name: seal-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      seal-migrate:
        condition: service_completed_successfully
    environment:
      HTTP_PORT: 8080
      LOG_LEVEL: info
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-seal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seal}
      POSTGRES_DB: ${POSTGRES_DB:-seal}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DOWNLOAD_URL_PREFIX: http://localhost:9000

  minio-setup:
    image: minio/mc:latest
    container_name: seal-minio-setup
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadminpassword} &&
      mc mb --ignore-existing myminio/seal-outputs &&
      mc anonymous set download myminio/seal-outputs &&
      echo 'MinIO setup complete'
      "

  seal-ui:
    image: ghcr.io/atlas-idp/seal-ui:dev
    container_name: seal-ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      seal-api:
        condition: service_started
    environment:
      HTTP_PORT: 8081
      LOG_LEVEL: info
      BACKEND_API_URL: http://seal-api:8080

volumes:
  pgdata:
  redisdata:
  miniodata:
