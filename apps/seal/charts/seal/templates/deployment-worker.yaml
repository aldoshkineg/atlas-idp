apiVersion: apps/v1
kind: Deployment
metadata:
  name: seal-worker
  labels:
    { { - include "seal.labels" (dict "name" "seal-worker") | nindent 4 } }
  annotations:
    argocd.argoproj.io/sync-wave: "130"
spec:
  replicas: { { .Values.replicaCount } }
  selector:
    matchLabels:
      app.kubernetes.io/name: seal-worker
      app.kubernetes.io/instance: { { .Release.Name } }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seal-worker
        app.kubernetes.io/instance: { { .Release.Name } }
        redis-client: "{{ .Values.redisClientLabel }}"
      annotations:
        argocd.argoproj.io/sync-wave: "130"
    spec:
      serviceAccountName: seal-worker
      containers:
        - name: seal-worker
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.worker.repository }}:{{ .Values.images.worker.tag }}"
          imagePullPolicy: { { .Values.images.worker.pullPolicy } }
          ports:
            - name: metrics
              containerPort: { { .Values.service.workerMetricsPort } }
              protocol: TCP
          envFrom:
            - configMapRef:
                name: seal-worker-config
            - secretRef:
                name: seal-worker-secret

          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: { { toYaml .Values.resources.worker | nindent 12 } }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: pdf-signer
              mountPath: /vault/secrets
              readOnly: true
      volumes:
        - name: pdf-signer
          secret:
            secretName: seal-pdf-signer
