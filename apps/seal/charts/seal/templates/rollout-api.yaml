{{- if .Values.rollouts.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: seal-api
  labels: {{- include "seal.labels" (dict "name" "seal-api") | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "130"
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: seal-api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seal-api
        app.kubernetes.io/instance: {{ .Release.Name }}
        redis-client: "{{ .Values.redisClientLabel }}"
      annotations:
        argocd.argoproj.io/sync-wave: "130"
    spec:
      serviceAccountName: seal-api
      securityContext: {{- include "seal.podSecurityContext" . | nindent 8 }}
      containers:
        - name: seal-api
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.api.repository }}:{{ .Values.images.api.tag }}"
          imagePullPolicy: {{ .Values.images.api.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.apiPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: seal-api-config
            - secretRef:
                name: seal-api-secret
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{ toYaml .Values.resources.api | nindent 12 }}
          securityContext: {{- include "seal.containerSecurityContext" . | nindent 12 }}
  strategy:
    canary:
      canaryService: {{ .Values.rollouts.canaryService }}
      stableService: {{ .Values.rollouts.stableService }}
      trafficRouting:
        managedRoutes:
          - {{ .Values.rollouts.trafficRouting.httpRoute }}
      steps:
{{ toYaml .Values.rollouts.canary.steps | indent 8 }}
{{- end }}
