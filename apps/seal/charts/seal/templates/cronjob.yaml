{{- if .Values.cronjob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: seal-dlq-reprocessor
  labels: {{- include "seal.labels" (dict "name" "seal-cronjob") | nindent 4 }}
spec:
  schedule: "{{ .Values.cronjob.schedule }}"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: {{ .Values.cronjob.ttlSecondsAfterFinished }}
      template:
        spec:
          restartPolicy: Never
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: reprocess
              image: redis:7-alpine
              command:
                - /bin/sh
                - -c
                - |
                  redis-cli -h {{ .Values.config.redis.host }} -p {{ .Values.config.redis.port }} \
                    LMOVE seal:dlq seal:jobs LEFT LEFT
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
              resources:
                requests:
                  cpu: {{ .Values.cronjob.resources.requests.cpu }}
                  memory: {{ .Values.cronjob.resources.requests.memory }}
                limits:
                  cpu: {{ .Values.cronjob.resources.limits.cpu }}
                  memory: {{ .Values.cronjob.resources.limits.memory }}
{{- end }}
