{{- if .Values.cronjob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: seal-dlq-reprocessor
  labels: {{- include "seal.labels" (dict "name" "seal-cronjob") | nindent 4 }}
spec:
  schedule: "{{ .Values.cronjob.schedule }}"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: {{ .Values.cronjob.ttlSecondsAfterFinished }}
      template:
        spec:
          restartPolicy: Never
          securityContext: {{- include "seal.redisSecurityContext" . | nindent 12 }}
          containers:
            - name: reprocess
              image: redis:7-alpine
              command:
                - /bin/sh
                - -c
                - |
                  redis-cli -h {{ .Values.config.redis.host }} -p {{ .Values.config.redis.port }} \
                    LMOVE seal:dlq seal:jobs LEFT LEFT
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
{{- end }}
