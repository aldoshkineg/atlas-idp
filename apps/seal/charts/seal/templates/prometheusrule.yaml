{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: seal-alerts
  labels: {{- include "seal.labels" (dict "name" "seal-alerts") | nindent 4 }}
spec:
  groups:
    - name: seal.alerts
      interval: 30s
      rules:
        - alert: QueueBacklog
          expr: keda_scaler_metrics_value{scaledobject="seal-worker"} > 100
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Seal job queue backlog > 100 for 5m"
            description: "Queue depth is {{`{{ $value }}`}}. Worker may be under-provisioned."

        - alert: WorkerFailures
          expr: rate(jobs_processed_total{job=~"seal-worker.*",status!="ok"}[10m]) > 0.1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Seal worker failures > 0.1/s for 5m"
            description: "Job failure rate is {{`{{ $value }}`}} per second."

        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{job=~"seal-api.*",status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job=~"seal-api.*"}[5m]))
            * 100 > 5
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Seal API error rate > 5% for 5m"
            description: "Error rate is {{`{{ $value | humanizePercentage }}`}}."

    - name: seal.slos
      interval: 30s
      rules:
        - record: seal:slo:api_latency_p95:ratio_5m
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{job=~"seal-api.*"}[5m]))
              by (le)
            )

        - record: seal:slo:worker_success_rate:ratio_5m
          expr: |
            sum(rate(jobs_processed_total{job=~"seal-worker.*",status="ok"}[5m]))
            /
            sum(rate(jobs_processed_total{job=~"seal-worker.*"}[5m]))
{{- end }}
