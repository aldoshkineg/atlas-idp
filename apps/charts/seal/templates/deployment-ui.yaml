apiVersion: apps/v1
kind: Deployment
metadata:
  name: seal-ui
  labels: {{- include "seal.labels" (dict "name" "seal-ui") | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: seal-ui
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seal-ui
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        {{- if .Values.vault.enabled }}
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "{{ .Values.vault.role }}"
        vault.hashicorp.com/agent-inject-secret-config: "{{ .Values.vault.paths.ui }}"
        vault.hashicorp.com/agent-inject-template-config: |
          {{`{{- with secret "`}}{{ .Values.vault.paths.ui }}{{`" -}}`}}
          {{`{{- end }}`}}
        {{- end }}
    spec:
      serviceAccountName: seal-ui
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.vault.enabled }}
      initContainers:
        - name: vault-agent
          image: hashicorp/vault:latest
          args:
            - agent
            - -config=/etc/vault/config.hcl
      {{- end }}
      containers:
        - name: seal-ui
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.ui.repository }}:{{ .Values.images.ui.tag }}"
          imagePullPolicy: {{ .Values.images.ui.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.uiPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: seal-ui-config

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{ toYaml .Values.resources.ui | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true