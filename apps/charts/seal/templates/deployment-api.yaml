apiVersion: apps/v1
kind: Deployment
metadata:
  name: seal-api
  labels: {{- include "seal.labels" (dict "name" "seal-api") | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: seal-api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seal-api
        app.kubernetes.io/instance: {{ .Release.Name }}
        redis-client: "{{ .Values.redisClientLabel }}"
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "{{ .Values.vault.role }}"
        vault.hashicorp.com/agent-inject-secret-config: "{{ .Values.vault.paths.api }}"
        vault.hashicorp.com/agent-inject-template-config: |
          {{`{{- with secret "`}}{{ .Values.vault.paths.api }}{{`" -}}`}}
          export POSTGRES_PASSWORD="{{`{{ .Data.data.postgres_password }}`}}"
          export REDIS_PASSWORD="{{`{{ .Data.data.redis_password }}`}}"
          {{`{{- end }}`}}
    spec:
      serviceAccountName: seal-api
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: vault-agent
          image: hashicorp/vault:latest
          args:
            - agent
            - -config=/etc/vault/config.hcl
      containers:
        - name: seal-api
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.api.repository }}:{{ .Values.images.api.tag }}"
          imagePullPolicy: {{ .Values.images.api.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.apiPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: seal-api-config
            - secretRef:
                name: seal-api-secret
          command:
            - /bin/sh
            - -c
            - |
              source /vault/secrets/config 2>/dev/null || true
              exec /app/seal-api
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{ toYaml .Values.resources.api | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true