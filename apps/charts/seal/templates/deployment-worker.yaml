apiVersion: apps/v1
kind: Deployment
metadata:
  name: seal-worker
  labels: {{- include "seal.labels" (dict "name" "seal-worker") | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: seal-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seal-worker
        app.kubernetes.io/instance: {{ .Release.Name }}
        redis-client: "{{ .Values.redisClientLabel }}"
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "{{ .Values.vault.role }}"
        vault.hashicorp.com/agent-inject-secret-config: "{{ .Values.vault.paths.worker }}"
        vault.hashicorp.com/agent-inject-template-config: |
          {{`{{- with secret "`}}{{ .Values.vault.paths.worker }}{{`" -}}`}}
          export MINIO_ACCESS_KEY="{{`{{ .Data.data.minio_access_key }}`}}"
          export MINIO_SECRET_KEY="{{`{{ .Data.data.minio_secret_key }}`}}"
          export REDIS_PASSWORD="{{`{{ .Data.data.redis_password }}`}}"
          {{`{{- end }}`}}
        vault.hashicorp.com/agent-inject-secret-tls-crt: "{{ .Values.vault.paths.pdfSigner }}"
        vault.hashicorp.com/agent-inject-template-tls-crt: |
          {{`{{- with secret "`}}{{ .Values.vault.paths.pdfSigner }}{{`" -}}`}}
          {{`{{ .Data.data.cert }}`}}
          {{`{{- end }}`}}
        vault.hashicorp.com/agent-inject-secret-tls-key: "{{ .Values.vault.paths.pdfSigner }}"
        vault.hashicorp.com/agent-inject-template-tls-key: |
          {{`{{- with secret "`}}{{ .Values.vault.paths.pdfSigner }}{{`" -}}`}}
          {{`{{ .Data.data.key }}`}}
          {{`{{- end }}`}}
    spec:
      serviceAccountName: seal-worker
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: vault-agent
          image: hashicorp/vault:latest
          args:
            - agent
            - -config=/etc/vault/config.hcl
      containers:
        - name: seal-worker
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.images.worker.repository }}:{{ .Values.images.worker.tag }}"
          imagePullPolicy: {{ .Values.images.worker.pullPolicy }}
          ports:
            - name: metrics
              containerPort: {{ .Values.service.workerMetricsPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: seal-worker-config
            - secretRef:
                name: seal-worker-secret
          command:
            - /bin/sh
            - -c
            - |
              source /vault/secrets/config 2>/dev/null || true
              exec /app/seal-worker
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{ toYaml .Values.resources.worker | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true