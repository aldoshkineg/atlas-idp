image:
  repository: ghcr.io/atlas-idp/backend-api
  tag: dev
  pullPolicy: IfNotPresent

replicaCount: 1

config:
  logLevel: info
  postgres:
    host: production-db-rw.database.svc.cluster.local
    port: 5432
    user: app
    database: app
  redis:
    host: redis-master.redis.svc.cluster.local
    port: 6379
  minio:
    endpoint: minio.minio.svc.cluster.local:9000
  downloadUrlPrefix: http://minio.minio.svc.cluster.local:9000
  otelExporterOtlpEndpoint: ""

secrets:
  postgresPassword: ""
  redisPassword: ""

vault:
  enabled: false
  role: text2pdf
  path: kv/data/text2pdf/backend-api

service:
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

migration:
  enabled: true
