{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: backend-api-migration
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backend-api.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend-api
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /app
            - migrate
          envFrom:
            - configMapRef:
                name: backend-api-config
          env:
            {{- if not .Values.vault.enabled }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-api-secret
                  key: POSTGRES_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-api-secret
                  key: REDIS_PASSWORD
            {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
{{- end }}
