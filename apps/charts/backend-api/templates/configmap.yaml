apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-api-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backend-api.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  POSTGRES_HOST: {{ .Values.config.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.config.postgres.port | quote }}
  POSTGRES_USER: {{ .Values.config.postgres.user | quote }}
  POSTGRES_DB: {{ .Values.config.postgres.database | quote }}
  REDIS_HOST: {{ .Values.config.redis.host | quote }}
  REDIS_PORT: {{ .Values.config.redis.port | quote }}
  MINIO_ENDPOINT: {{ .Values.config.minio.endpoint | quote }}
  DOWNLOAD_URL_PREFIX: {{ .Values.config.downloadUrlPrefix | quote }}
  HTTP_PORT: {{ .Values.service.port | quote }}
{{- if .Values.config.otelExporterOtlpEndpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otelExporterOtlpEndpoint | quote }}
{{- end }}
