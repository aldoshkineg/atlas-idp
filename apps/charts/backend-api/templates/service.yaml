apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backend-api.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: backend-api
    app.kubernetes.io/instance: {{ .Release.Name }}
