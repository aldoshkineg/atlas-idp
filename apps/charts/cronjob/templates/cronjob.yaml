apiVersion: batch/v1
kind: CronJob
metadata:
  name: dlq-reprocessor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cronjob.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "cronjob.labels" . | nindent 12 }}
            redis-client: "true"
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ .Release.Name }}
          containers:
            - name: dlq-reprocessor
              image: "{{ .Values.image }}"
              imagePullPolicy: {{ .Values.imagePullPolicy }}
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  host={{ .Values.config.redis.host }}
                  port={{ .Values.config.redis.port }}
                  pass="${REDIS_PASSWORD}"

                  echo "DLQ reprocessor: checking queue..."
                  count=0
                  while true; do
                    result=$(redis-cli -h "$host" -p "$port" --connect-timeout 3 ${pass:+-a "$pass"} LMOVE text2pdf:dlq text2pdf:jobs LEFT LEFT 2>/dev/null || true)
                    if [ -z "$result" ]; then
                      break
                    fi
                    count=$((count + 1))
                  done
                  echo "DLQ reprocessor: $count items moved to jobs queue"
              env:
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: cronjob-secret
                      key: REDIS_PASSWORD
