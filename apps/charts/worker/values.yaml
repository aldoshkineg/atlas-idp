image:
  repository: ghcr.io/atlas-idp/worker
  tag: dev
  pullPolicy: IfNotPresent

replicaCount: 1

config:
  redis:
    host: redis-master.redis.svc.cluster.local
    port: 6379
  minio:
    endpoint: minio.minio.svc.cluster.local:9000
    useSSL: false
    accessKey: ""
    secretKey: ""
  signCertPath: /vault/secrets/tls.crt
  signKeyPath: /vault/secrets/tls.key
  pollIntervalMs: 1000
  otelExporterOtlpEndpoint: ""

secrets:
  redisPassword: ""
  minioAccessKey: ""
  minioSecretKey: ""

vault:
  enabled: false
  role: text2pdf
  path: kv/data/text2pdf/worker

service:
  port: 9090

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 300m
    memory: 256Mi
