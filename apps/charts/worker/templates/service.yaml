apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "worker.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ .Values.service.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: worker
    app.kubernetes.io/instance: {{ .Release.Name }}
