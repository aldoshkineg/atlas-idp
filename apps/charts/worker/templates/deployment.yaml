apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "worker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "worker.labels" . | nindent 8 }}
        redis-client: "true"
      annotations:
        {{- if .Values.vault.enabled }}
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        vault.hashicorp.com/agent-inject-secret-config: {{ .Values.vault.path | quote }}
        vault.hashicorp.com/agent-inject-template-config: |
{{- printf "{{- with secret \"%s\" -}}" .Values.vault.path | nindent 10 }}
          export REDIS_PASSWORD="{{`{{ .Data.data.redis_password }}`}}"
          export MINIO_ACCESS_KEY="{{`{{ .Data.data.minio_access_key }}`}}"
          export MINIO_SECRET_KEY="{{`{{ .Data.data.minio_secret_key }}`}}"
{{ `{{- end }}` | nindent 10 }}
        vault.hashicorp.com/agent-inject-secret-tls-crt: kv/data/text2pdf/pdf-signer
        vault.hashicorp.com/agent-inject-template-tls-crt: |
{{ `{{- with secret "kv/data/text2pdf/pdf-signer" -}}` | nindent 10 }}
{{ `{{ .Data.data.cert }}` | nindent 10 }}
{{ `{{- end }}` | nindent 10 }}
        vault.hashicorp.com/agent-inject-secret-tls-key: kv/data/text2pdf/pdf-signer
        vault.hashicorp.com/agent-inject-template-tls-key: |
{{ `{{- with secret "kv/data/text2pdf/pdf-signer" -}}` | nindent 10 }}
{{ `{{ .Data.data.key }}` | nindent 10 }}
{{ `{{- end }}` | nindent 10 }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
          {{- if .Values.vault.enabled }}
            - /bin/sh
            - -c
            - |
              source /vault/secrets/config
              exec /app
          {{- else }}
            - /app
          {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: worker-config
          env:
            {{- if not .Values.vault.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: worker-secret
                  key: REDIS_PASSWORD
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: worker-secret
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: worker-secret
                  key: MINIO_SECRET_KEY
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
