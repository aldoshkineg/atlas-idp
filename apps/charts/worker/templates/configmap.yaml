apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "worker.labels" . | nindent 4 }}
data:
  REDIS_HOST: {{ .Values.config.redis.host | quote }}
  REDIS_PORT: {{ .Values.config.redis.port | quote }}
  MINIO_ENDPOINT: {{ .Values.config.minio.endpoint | quote }}
  MINIO_USE_SSL: {{ .Values.config.minio.useSSL | quote }}
  SIGN_CERT_PATH: {{ .Values.config.signCertPath | quote }}
  SIGN_KEY_PATH: {{ .Values.config.signKeyPath | quote }}
  WORKER_POLL_INTERVAL_MS: {{ .Values.config.pollIntervalMs | quote }}
{{- if .Values.config.otelExporterOtlpEndpoint }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otelExporterOtlpEndpoint | quote }}
{{- end }}
