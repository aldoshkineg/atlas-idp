apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: atlasteam-seal
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "90"
    argocd.argoproj.io/depends-on: postgres-cluster,redis,minio,cert-manager
spec:
  project: workloads
  sources:
    - repoURL: https://github.com/aldoshkineg/atlas-idp.git
      targetRevision: main
      path: apps/seal/charts/seal
      helm:
        values: |
          global:
            imageRegistry: ghcr.io/aldoshkineg
          images:
            api:
              tag: v0.52.0
            worker:
              tag: v0.52.0
            ui:
              tag: v0.52.0
          vault:
            enabled: false
          gateway:
            enabled: true
          secrets:
            create: false
          rollouts:
            enabled: true
            trafficRouting:
              httpRoute: seal
          migration:
            enabled: true
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 256Mi
          keda:
            enabled: false
          config:
            postgres:
              user: seal
              db: seal
            otel:
              endpoint: http://alloy.monitoring:4318
    - repoURL: https://github.com/aldoshkineg/atlas-idp
      targetRevision: main
      path: gitops/workloads/atlasteam/seal/resources
      directory:
        recurse: true
        exclude: "{.secret-seed,*.tmpl}"
  destination:
    server: https://kubernetes.default.svc
    namespace: atlasteam-seal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    ignoreDifferences:
      - group: apps
        kind: Deployment
        jqPathExpressions:
          - 'if contains("@sha256:") then sub("@sha256:[^\"]*";"") else . end'
      - group: argoproj.io
        kind: Rollout
        jqPathExpressions:
          - 'if contains("@sha256:") then sub("@sha256:[^\"]*";"") else . end'
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
