# Required ArgoCD AppProject for all atlasctl-managed workloads.
# Every Application generated by "atlasctl enable" references "project: workloads".
# Without this resource, ArgoCD will reject any workload Application.
# Synced by root-app via gitops/workloads/ (sync-wave -1 ensures it exists first).
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: workloads
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: "Default project for atlasctl-managed workloads"
  sourceRepos:
    - https://github.com/aldoshkineg/atlas-idp.git
  destinations:
    - namespace: "*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
