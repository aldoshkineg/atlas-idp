# Platform Gateway resource - HTTP listener on port 80
# This will be discovered by Argo CD root-app (directory recursion)
# and created as a Kubernetes resource (not an Application CR)
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: platform-gateway
  namespace: gateway-api
spec:
  gatewayClassName: nginx
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      # Allow all namespaces to create HTTPRoutes
      allowedRoutes:
        namespaces:
          from: All
