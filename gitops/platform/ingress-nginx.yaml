apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/component: platform
    app.kubernetes.io/layer: networking
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    targetRevision: 4.11.3
    chart: ingress-nginx
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          # kind-specific: use hostPort for ingress
          hostPort:
            enabled: true
            ports:
              http: 80
              https: 443

          service:
            type: NodePort

          # Publish service on kind control-plane node
          nodeSelector:
            ingress-ready: "true"

          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Equal
              effect: NoSchedule
            - key: node-role.kubernetes.io/master
              operator: Equal
              effect: NoSchedule

          # Resource limits for kind
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi

          # Metrics for Prometheus
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true

          # Admission webhook (optional, disable for simplicity)
          admissionWebhooks:
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
