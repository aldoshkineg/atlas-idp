fullnameOverride: linstor

linstorCluster:
  nodeSelector:
    kubernetes.io/os: linux
  controller:
    enabled: true
  csiController:
    enabled: true
  csiNode:
    enabled: true
  affinityController:
    enabled: true
  highAvailabilityController:
    enabled: false
  nfsServer:
    enabled: false

linstorSatelliteConfigurations:
  - name: talos
    nodeSelector:
      kubernetes.io/os: linux
    storagePools:
      - name: lvm-pool
        lvmThinPool:
          volumeGroup: linstor-vg
          thinPool: linstor-thin
        source:
          hostDevices:
            - /dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_incus_linstor
    patches:
      - target:
          kind: DaemonSet
          name: linstor-satellite
        patch: |
          apiVersion: apps/v1
          kind: DaemonSet
          metadata:
            name: linstor-satellite
          spec:
            template:
              spec:
                initContainers:
                  - name: drbd-module-loader
                    $patch: delete
                  - name: drbd-shutdown-guard
                    $patch: delete
                volumes:
                  - name: usr-src
                    $patch: delete
                  - name: run-systemd-system
                    $patch: delete
                  - name: run-drbd-shutdown-guard
                    $patch: delete
                  - name: systemd-bus-socket
                    $patch: delete
                  - name: etc-lvm-archive
                    hostPath:
                      path: /var/etc/lvm/archive
                  - name: etc-lvm
                    hostPath:
                      path: /var/etc/lvm
                  - name: etc-lvm-backup
                    hostPath:
                      path: /var/etc/lvm/backup
                containers:
                  - name: linstor-satellite

storageClasses:
  - name: linstor-replicated
    annotations:
      storageclass.kubernetes.io/is-default-class: "true"
    allowVolumeExpansion: true
    volumeBindingMode: WaitForFirstConsumer
    reclaimPolicy: Delete
    parameters:
      autoPlace: "2"
      storagePool: lvm-pool

volumeSnapshotClasses:
  - name: linstor-csi-snapshot
    annotations:
      snapshot.storage.kubernetes.io/is-default-class: "true"
    driver: linstor.csi.linbit.com
    deletionPolicy: Delete
    parameters:
      storagePool: lvm-pool
