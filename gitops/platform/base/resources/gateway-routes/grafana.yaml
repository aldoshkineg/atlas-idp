apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-cert
  namespace: kube-system
spec:
  secretName: grafana-cert
  duration: 2160h
  renewBefore: 360h
  subject:
    organizations:
      - atlas-idp
  dnsNames:
    - grafana.atlas
  issuerRef:
    name: atlas-ca-issuer
    kind: ClusterIssuer
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: monitoring
spec:
  parentRefs:
    - name: platform-gateway
      namespace: kube-system
      sectionName: https-grafana
  hostnames:
    - grafana.atlas
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
