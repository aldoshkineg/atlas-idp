apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-cert
  namespace: kube-system
spec:
  secretName: vault-cert
  duration: 2160h
  renewBefore: 360h
  subject:
    organizations:
      - atlas-idp
  dnsNames:
    - vault.atlas
  issuerRef:
    name: atlas-ca-issuer
    kind: ClusterIssuer
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vault-route
  namespace: vault
spec:
  parentRefs:
    - name: platform-gateway
      namespace: kube-system
      sectionName: https-vault
  hostnames:
    - vault.atlas
  rules:
    - backendRefs:
        - name: vault
          port: 8200
