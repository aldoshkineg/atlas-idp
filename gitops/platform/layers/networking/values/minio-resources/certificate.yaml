apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: minio-cert
  namespace: nginx-gateway-fabric
spec:
  secretName: minio-cert
  duration: 2160h
  renewBefore: 360h
  subject:
    organizations:
      - atlas-idp
  dnsNames:
    - s3.atlas
  issuerRef:
    name: dev-ca-issuer
    kind: ClusterIssuer
