apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minio-console-route
  namespace: minio
spec:
  parentRefs:
    - name: platform-gateway
      namespace: nginx-gateway-fabric
      sectionName: https-s3-console
  hostnames:
    - console.s3.atlas
  rules:
    - backendRefs:
        - name: minio-console
          port: 9001
