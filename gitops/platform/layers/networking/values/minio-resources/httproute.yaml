apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minio-route
  namespace: minio
spec:
  parentRefs:
    - name: platform-gateway
      namespace: nginx-gateway-fabric
      sectionName: https-s3
  hostnames:
    - s3.atlas
  rules:
    - backendRefs:
        - name: minio
          port: 9000
