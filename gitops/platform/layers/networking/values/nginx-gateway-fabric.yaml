nginxGateway:
  gatewayClassName: nginx
  telemetry:
    enable: true
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  secrets:
    - name: test-ca-cert
      namespace: nginx-gateway-fabric
      key: tls.crt
    - name: test-ca-cert
      namespace: nginx-gateway-fabric
      key: tls.key

nodeSelector:
  ingress-ready: "true"

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Equal
    effect: NoSchedule

nginx:
  container:
    hostPorts:
      - port: 80
        containerPort: 80
      - port: 443
        containerPort: 443
