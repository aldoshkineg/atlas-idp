apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: monitoring
spec:
  parentRefs:
    - name: grafana-gateway
      namespace: nginx-gateway-fabric
      sectionName: https-grafana
  hostnames:
    - grafana.atlas
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
