apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: dev-ca-issuer
spec:
  ca:
    secretName: dev-ca-secret
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: test-ca-cert
  namespace: nginx-gateway-fabric
spec:
  secretName: test-ca-cert
  duration: 2160h
  renewBefore: 360h
  subject:
    organizations:
      - atlas-idp
  dnsNames:
    - test-ca.atlas
  issuerRef:
    name: dev-ca-issuer
    kind: ClusterIssuer
