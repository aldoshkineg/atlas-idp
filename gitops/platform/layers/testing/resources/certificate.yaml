# ClusterIssuer backed by a TLS secret `dev-ca-secret`.
# This secret must be created BEFORE this manifests is applied:
#   kubectl create secret tls dev-ca-secret --cert=ca.crt --key=ca.key -n cert-manager
# The secret is created automatically by Terraform in kind environment
# (see .github/actions/terraform-kind/action.yml).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: dev-ca-issuer
spec:
  ca:
    secretName: dev-ca-secret
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: test-ca-cert
  namespace: nginx-gateway-fabric
spec:
  secretName: test-ca-cert
  duration: 2160h
  renewBefore: 360h
  subject:
    organizations:
      - atlas-idp
  dnsNames:
    - test-ca.atlas
  issuerRef:
    name: dev-ca-issuer
    kind: ClusterIssuer
