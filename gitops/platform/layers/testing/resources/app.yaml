apiVersion: v1
kind: ServiceAccount
metadata:
  name: test-app
  namespace: testing
---
apiVersion: v1
kind: Service
metadata:
  name: test-app
  namespace: testing
  labels:
    app: test-app
spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: test-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app
  namespace: testing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      serviceAccountName: test-app
      containers:
        - name: whoami
          image: docker.io/traefik/whoami:v1.10
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: test-app-route
  namespace: testing
spec:
  parentRefs:
    - name: platform-gateway
      namespace: nginx-gateway-fabric
      sectionName: https-test
  hostnames:
    - test-ca.atlas
  rules:
    - backendRefs:
        - name: test-app
          port: 80
