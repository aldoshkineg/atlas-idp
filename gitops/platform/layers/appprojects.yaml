apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: base
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1000"
spec:
  description: "Base layer (foundation: cert-manager, gateway-api, vault, linstor, external-secrets)"
  destinations:
    - server: "*"
      namespace: "*"
  sourceRepos:
    - "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
---
