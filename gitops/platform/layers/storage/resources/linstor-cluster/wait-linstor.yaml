---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wait-linstor
  namespace: piraeus-datastore
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wait-linstor
  namespace: piraeus-datastore
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wait-linstor
  namespace: piraeus-datastore
subjects:
  - kind: ServiceAccount
    name: wait-linstor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wait-linstor
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-linstor
  namespace: piraeus-datastore
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: wait-linstor
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: wait-linstor
          image: bitnamilegacy/kubectl:1.33.4
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for LINSTOR controller pod to be Ready..."
              kubectl wait \
                --namespace=piraeus-datastore \
                --for=condition=Ready \
                pod -l app.kubernetes.io/component=controller \
                --timeout=600s
              echo "Controller is Ready"

              echo "Waiting for LINSTOR satellite pods to be Ready..."
              kubectl wait \
                --namespace=piraeus-datastore \
                --for=condition=Ready \
                pod -l app.kubernetes.io/component=node \
                --timeout=600s
              echo "Satellites are Ready"