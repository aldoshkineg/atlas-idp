apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: csi-hostpath-driver
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kubernetes-csi/csi-driver-host-path.git
    targetRevision: master
    path: deploy/kubernetes-1.30/hostpath
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
