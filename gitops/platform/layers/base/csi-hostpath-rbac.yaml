apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: csi-hostpath-rbac
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/anomalyco/atlas-idp.git
    targetRevision: master
    path: gitops/platform/layers/base/csi-hostpath-rbac
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
