apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/component: platform
    app.kubernetes.io/layer: observability
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/metrics-server/
    targetRevision: 3.12.2
    chart: metrics-server
    helm:
      releaseName: metrics-server
      values: |
        # kind-specific: disable TLS verification for self-signed kubelet certs
        args:
          - --kubelet-insecure-tls
          - --kubelet-preferred-address-types=InternalIP
        
        # Resource limits
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        
        # Enable APIService registration
        apiService:
          create: true
        
        # Service monitor for Prometheus (optional)
        metrics:
          enabled: true
        
        # HA mode (disabled for kind)
        replicas: 1
  
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
