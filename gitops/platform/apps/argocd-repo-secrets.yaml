apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-repo-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.arg.io
spec:
  project: default
  source:
    repoURL: https://github.com/aldoshkineg/atlas-idp.git
    targetRevision: main
    path: gitops/bootstrap/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
