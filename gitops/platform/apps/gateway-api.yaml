# Step 1: Install official Gateway API CRDs from upstream
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/component: platform
    app.kubernetes.io/layer: networking
spec:
  project: default
  source:
    repoURL: https://github.com/kubernetes-sigs/gateway-api
    targetRevision: v1.1.0
    path: config/crd/standard
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
# Step 2: Install NGINX Gateway Fabric Controller via official Helm Chart
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-gateway-fabric
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/component: platform
    app.kubernetes.io/layer: networking
spec:
  project: default
  source:
    repoURL: oci://ghcr.io/nginx/charts
    targetRevision: v1.4.0
    chart: nginx-gateway-fabric
    helm:
      releaseName: nginx-gateway-fabric
      values: |
        nginxGateway:
          gatewayClassName: nginx
          hostNetwork: true
          pod:
            nodeSelector:
              ingress-ready: "true"
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Equal
                effect: NoSchedule
              - key: node-role.kubernetes.io/master
                operator: Equal
                effect: NoSchedule
            resources:
              limits:
                cpu: 500m
                memory: 512Mi
              requests:
                cpu: 100m
                memory: 128Mi
          telemetry:
            enable: true
        service:
          create: false
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-gateway-fabric
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
  dependsOn:
    - name: gateway-api-crds
---
# Step 3: Deploy custom platform configurations (Gateways, HTTPRoutes)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-configs
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/aldoshkineg/atlas-idp.git
    targetRevision: main
    path: gitops/platform/configs
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-gateway-fabric
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      retry:
        limit: 10
        backoff:
          duration: 5s
          factor: 2
          maxDuration: 2m
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - SkipDryRunOnMissingResource=true
  dependsOn:
    - name: nginx-gateway-fabric
