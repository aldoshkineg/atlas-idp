apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-image-signature
  annotations:
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: critical
spec:
  # Enforce (not Audit): tag-based image verification requires mutateDigest=true,
  # which Kyverno only permits in Enforce mode. In Audit mode mutateDigest is
  # forced false, the digest cannot be resolved, and signature verification
  # cannot run ("missing digest"/"unverified" for every tag).
  validationFailureAction: Enforce
  background: true
  webhookTimeoutSeconds: 30
  failurePolicy: Fail
  rules:
    - name: verify-seal-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - argocd
                - kyverno
                - cert-manager
                - cnpg-system
                - external-secrets
                - monitoring
                - loki
                - minio
                - vault
                - velero
                - trivy-system
                - argo-rollouts
                - piraeus-datastore
                - database
                - redis
                - default
      verifyImages:
        - imageReferences:
            - "ghcr.io/aldoshkineg/*"
          key: |-
            -----BEGIN PUBLIC KEY-----
            MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEhUzEwMGdLyI6HRt2i3EmrNWknX+F
            aG1mTKGJbs1QmB0ckMqHTfFChg/jxXNlvdXNW+jm196yYVh5jS6iTSmszQ==
            -----END PUBLIC KEY-----
          required: true
          mutateDigest: true
          useCache: false
          verifyDigest: true
