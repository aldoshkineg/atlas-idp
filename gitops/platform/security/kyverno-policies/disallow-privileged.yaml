apiVersion: kyverno.io/v2beta1
kind: ClusterPolicy
metadata:
  name: disallow-privileged
  annotations:
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Audit
  rules:
    - name: validate-privileged
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - argocd
                - kyverno
                - cert-manager
                - cnpg-system
                - external-secrets
                - monitoring
                - loki
                - minio
                - vault
                - velero
                - trivy-system
                - argo-rollouts
                - piraeus-datastore
                - database
                - redis
      validate:
        message: "Privileged containers are not allowed."
        pattern:
          spec:
            # Validate securityContext.privileged only when it is set. An unset
            # field defaults to false, so requiring an explicit `privileged: false`
            # would falsely fail otherwise-compliant containers.
            containers:
              - =(securityContext):
                  =(privileged): false
            =(initContainers):
              - =(securityContext):
                  =(privileged): false
            =(ephemeralContainers):
              - =(securityContext):
                  =(privileged): false
    - name: validate-hostpath
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - argocd
                - kyverno
                - cert-manager
                - cnpg-system
                - external-secrets
                - monitoring
                - loki
                - minio
                - vault
                - velero
                - trivy-system
                - argo-rollouts
                - piraeus-datastore
                - database
                - redis
      validate:
        message: "hostPath volumes are not allowed."
        # Pattern with anchors is null-safe: `=(volumes)` only evaluates when the
        # pod declares volumes, and `X(hostPath): "null"` requires hostPath to be
        # unset on every volume. The previous deny/JMESPath form crashed with
        # "Invalid type for: <nil>" whenever spec.volumes was absent.
        pattern:
          spec:
            =(volumes):
              - X(hostPath): "null"
