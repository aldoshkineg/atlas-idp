# Self-signed Issuer for platform TLS certificates
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: platform-selfsigned-issuer
  namespace: nginx-gateway-fabric
spec:
  selfSigned: {}
---
# CA Issuer that issues from the self-signed cert
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: platform-ca-issuer
  namespace: nginx-gateway-fabric
spec:
  ca:
    secretName: platform-ca-key-pair
---
# CA certificate for the platform
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: platform-ca-cert
  namespace: nginx-gateway-fabric
spec:
  isCA: true
  issuerRef:
    name: platform-selfsigned-issuer
    kind: Issuer
  commonName: platform-ca
  secretName: platform-ca-key-pair
---
# Platform TLS certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: platform-tls-cert
  namespace: nginx-gateway-fabric
spec:
  secretName: platform-tls-cert
  dnsNames:
    - "*.local.atlas"
    - "localhost"
    - "*.localhost"
  issuerRef:
    name: platform-ca-issuer
    kind: Issuer
