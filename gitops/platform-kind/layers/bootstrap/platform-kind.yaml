apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-kind
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: "Kind-specific platform services (networking, security, observability, storage)"

  destinations:
    - namespace: database
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: cnpg-system
      server: https://kubernetes.default.svc
    - namespace: default
      server: https://kubernetes.default.svc
    - namespace: keda
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
    - namespace: loki
      server: https://kubernetes.default.svc
    - namespace: minio
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: nginx-gateway-fabric
      server: https://kubernetes.default.svc
    - namespace: storage
      server: https://kubernetes.default.svc
    - namespace: redis
      server: https://kubernetes.default.svc
    - namespace: vault
      server: https://kubernetes.default.svc
    - namespace: velero
      server: https://kubernetes.default.svc

  sourceRepos:
    - https://github.com/aldoshkineg/atlas-idp.git
    - https://charts.jetstack.io
    - https://grafana.github.io/helm-charts
    - https://prometheus-community.github.io/helm-charts
    - https://kubernetes-sigs.github.io/metrics-server/
    - https://charts.min.io/
    - https://vmware-tanzu.github.io/helm-charts
    - https://github.com/kubernetes-sigs/gateway-api
    - https://github.com/kubernetes-csi/external-snapshotter.git
    - ghcr.io/nginx/charts
    - ghcr.io/bank-vaults/helm-charts
    - https://kedacore.github.io/charts
    - registry-1.docker.io/bitnamicharts
    - https://cloudnative-pg.github.io/charts

  clusterResourceWhitelist:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: cert-manager.io
      kind: ClusterIssuer
    - group: gateway.networking.k8s.io
      kind: GatewayClass
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: snapshot.storage.k8s.io
      kind: VolumeSnapshotClass
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: apiregistration.k8s.io
      kind: APIService
    - group: storage.k8s.io
      kind: CSIDriver
    - group: storage.k8s.io
      kind: StorageClass
    - group: ""
      kind: Namespace
