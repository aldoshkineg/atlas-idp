service:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
      nodePort: 30081
    - port: 443
      targetPort: 443
      protocol: TCP
      name: https
      nodePort: 30444

nodeSelector:
  ingress-ready: "true"

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Equal
    effect: NoSchedule

metrics:
  enable: true
  port: 9113

nginxGateway:
  kind: deployment
  gatewayClassName: nginx
  replicaCount: 1
