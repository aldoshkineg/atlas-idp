apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  provider:
    hashicorpVault:
      server: http://vault.vault.svc:8200
      path: secret
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
          namespace: external-secrets
