---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wait-vault
  namespace: vault
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wait-vault
  namespace: vault
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wait-vault
  namespace: vault
subjects:
  - kind: ServiceAccount
    name: wait-vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wait-vault
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-vault
  namespace: vault
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: wait-vault
      containers:
        - name: wait-vault
          image: bitnamilegacy/kubectl:1.33.4
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for vault-0 to become Ready..."
              kubectl wait \
                --namespace=vault \
                --for=condition=Ready \
                pod/vault-0 \
                --timeout=600s
              echo "vault-0 is Ready"
