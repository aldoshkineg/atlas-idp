apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: velero-aws
  namespace: velero
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: velero-aws
    template:
      data:
        cloud: |
          [default]
          aws_access_key_id = {{ .rootUser }}
          aws_secret_access_key = {{ .rootPassword }}
  data:
    - secretKey: rootUser
      remoteRef:
        key: secret/platform/minio
        property: rootUser
    - secretKey: rootPassword
      remoteRef:
        key: secret/platform/minio
        property: rootPassword
