apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/depends-on: csi-hostpath, kube-prometheus-stack
  labels:
    app.kubernetes.io/component: platform
    app.kubernetes.io/layer: data
spec:
  project: platform-kind
  sources:
    - repoURL: registry-1.docker.io/bitnamicharts
      chart: redis
      targetRevision: 24.0.8
      helm:
        releaseName: redis
        valueFiles:
          - $values/gitops/platform-kind/layers/data/values/redis.yaml
    - repoURL: https://github.com/aldoshkineg/atlas-idp.git
      targetRevision: main
      ref: values
  ignoreDifferences:
    # 1. Игнорируем все поля в StatefulSet, которые мешают работе ArgoCD
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/replicas
        - /spec/template/metadata/annotations
      jqPathExpressions:
        - .spec.updateStrategy
      managedFieldsManagers:
        - "*"
  destination:
    server: https://kubernetes.default.svc
    namespace: redis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
