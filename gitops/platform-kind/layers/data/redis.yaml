apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/depends-on: csi-hostpath, kube-prometheus-stack
  labels:
    app.kubernetes.io/component: platform
    app.kubernetes.io/layer: data
spec:
  project: platform-kind
  sources:
    - repoURL: registry-1.docker.io/bitnamicharts
      chart: redis
      targetRevision: 24.0.8
      helm:
        releaseName: redis
        valueFiles:
          - $values/gitops/platform-kind/layers/data/values/redis.yaml
    - repoURL: https://github.com/aldoshkineg/atlas-idp.git
      targetRevision: main
      ref: values
  ignoreDifferences:

    # -----------------------------
    # GLOBAL SAFE IGNORES
    # -----------------------------
    - group: "*"
      kind: "*"
      jsonPointers:
        - /status
        - /metadata/resourceVersion
        - /metadata/generation
        - /metadata/managedFields

    # -----------------------------
    # STATEFULSET (Redis master/replica)
    # -----------------------------
    - group: apps
      kind: StatefulSet
      jsonPointers:
        # Bitnami checksum annotations
        - /spec/template/metadata/annotations/checksum~1config
        - /spec/template/metadata/annotations/checksum~1scripts

        # Common SSA noise fields
        - /status

    # -----------------------------
    # SECRET (Bitnami Redis auth)
    # -----------------------------
    - group: ""
      kind: Secret
      jsonPointers:
        # Redis password & replication auth are often generated
        - /data/redis-password
        - /data/replication-password
        - /metadata/annotations

    # -----------------------------
    # CONFIGMAP (scripts / config templates)
    # -----------------------------
    - group: ""
      kind: ConfigMap
      jqPathExpressions:
        # Ignore ordering / checksum-style metadata drift
        - '.metadata.annotations["checksum/config"]'
        - '.metadata.annotations["checksum/scripts"]'

    # -----------------------------
    # HPA (metric ordering problem)
    # -----------------------------
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jqPathExpressions:
        - '.spec.metrics'

    # -----------------------------
    # SERVICE (annotations + LB controller noise)
    # -----------------------------
    - group: ""
      kind: Service
      jsonPointers:
        - /metadata/annotations
        - /status

    # -----------------------------
    # PDB (minor controller drift)
    # -----------------------------
    - group: policy
      kind: PodDisruptionBudget
      jsonPointers:
        - /status
        - /metadata/annotations
  destination:
    server: https://kubernetes.default.svc
    namespace: redis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
