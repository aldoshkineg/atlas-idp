apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: production-db
  namespace: database
  labels:
    app.kubernetes.io/component: database
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: production-db
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - database