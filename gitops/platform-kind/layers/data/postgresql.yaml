apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "7"
  labels:
    app.kubernetes.io/component: platform
    app.kubernetes.io/layer: data
spec:
  project: platform-kind
  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      targetRevision: 16.4.3
      chart: postgresql
      helm:
        releaseName: postgresql
        valueFiles:
          - $values/gitops/platform-kind/layers/data/values/postgresql.yaml
    - repoURL: https://github.com/aldoshkineg/atlas-idp.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: database
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /status
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /metadata/annotations
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
