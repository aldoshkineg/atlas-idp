architecture: standalone

auth:
  enabled: true
  existingSecret: redis-auth

master:
  count: 1

  persistence:
    enabled: true
    size: 256Mi
    storageClass: csi-hostpath-sc

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  podSecurityContext:
    enabled: true
    fsGroup: 1001

  containerSecurityContext:
    enabled: true
    runAsNonRoot: true
    runAsUser: 1001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  livenessProbe:
    enabled: true

  readinessProbe:
    enabled: true

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

metrics:
  enabled: true

  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s

networkPolicy:
  enabled: false
