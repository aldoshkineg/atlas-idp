# PostgreSQL 16 (Bitnami) - DEV-ONLY: hardcoded credentials
# Use Vault or external-secrets for production.

auth:
  enablePostgresUser: true
  username: text2pdf
  password: devpassword
  database: text2pdf
  postgresPassword: devpostgres

primary:
  persistence:
    enabled: true
    size: 256Mi
    storageClass: csi-hostpath-sc

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

  podAnnotations:
    pre.hook.backup.velero.io/command: >-
      ["/bin/sh", "-c", "psql -U postgres -c \"CHECKPOINT;\" &&
      pg_dumpall -U postgres --clean --if-exists >
      /bitnami/postgresql/data/velero-dump.sql"]
    pre.hook.backup.velero.io/container: postgresql
    pre.hook.backup.velero.io/timeout: "300s"
    pre.hook.backup.velero.io/on-error: fail
    post.hook.backup.velero.io/command: '["rm", "/bitnami/postgresql/data/velero-dump.sql"]'
    post.hook.backup.velero.io/container: postgresql
    post.hook.backup.velero.io/timeout: "60s"

  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  livenessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  startupProbe:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30

  extendedConfiguration: |-
    shared_preload_libraries = 'pgaudit'
    pgaudit.log = 'write'
    client_min_messages = warning
    log_line_prefix = '%m [%p] %q:%u@%d '
    log_timezone = 'UTC'

  podSecurityContext:
    enabled: true
    fsGroup: 1001

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: database
    interval: 30s
    scrapeTimeout: 10s
    labels:
      release: kube-prometheus-stack
    additionalLabels:
      app.kubernetes.io/component: database
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

service:
  type: ClusterIP
  port: 5432

volumePermissions:
  enabled: false
