apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app.kubernetes.io/component: platform
    app.kubernetes.io/layer: storage
spec:
  project: platform-kind
  source:
    repoURL: https://charts.min.io/
    chart: minio
    targetRevision: 5.4.0
    helm:
      releaseName: minio
      values: |
        # DEV-ONLY: hardcoded credentials for kind cluster.
        # Use Vault or external-secrets for production.
        mode: standalone
        replicas: 1
        drivesPerNode: 1
        rootUser: minioadmin
        rootPassword: minioadminpassword
        persistence:
          enabled: true
          size: 3Gi
        buckets:
          - name: k8s-velero-backups
            policy: none
            purge: false
        tls:
          enabled: false
        service:
          type: ClusterIP
          port: 9000
        consoleService:
          type: ClusterIP
          port: 9001
        resources:
          requests:
            memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: minio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
