deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
  persistence:
    enabled: true
    storageClass: csi-hostpath-sc
    size: 1Gi

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

loki:
  auth_enabled: false

  analytics:
    reporting_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: filesystem

  limits_config:
    retention_period: 10d
    allow_structured_metadata: true
    volume_enabled: true

  compactor:
    retention_enabled: true
    delete_request_store: filesystem

  pattern_ingester:
    enabled: true
