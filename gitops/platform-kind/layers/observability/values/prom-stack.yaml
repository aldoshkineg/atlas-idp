# Prometheus configuration
prometheus:
  prometheusSpec:
    # Resource limits for kind
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi
    # Topology spread for balanced node distribution
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: prometheus
    # Retention
    retention: 2d
    retentionSize: 1GB
    # Service monitors
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    # Storage (ephemeral for kind, use PVC for production)
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: csi-hostpath-sc
          resources:
            requests:
              storage: 1Gi
    # Custom alert rules (mounted from observability/alerts/)
    additionalScrapeConfigs: []
# Grafana configuration
grafana:
  enabled: true
  admin:
    existingSecret: grafana-admin
  service:
    type: NodePort
    nodePort: 30300
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  persistence:
    enabled: true
    type: pvc
    storageClassName: csi-hostpath-sc
    accessModes:
      - ReadWriteOnce
    size: 1Gi
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  additionalDataSources:
    - name: Loki
      uid: loki
      type: loki
      access: proxy
      url: http://loki-gateway.loki.svc.cluster.local
      isDefault: false
      editable: true
    - name: Tempo
      uid: tempo
      type: tempo
      access: proxy
      url: http://tempo.observability.svc.cluster.local:3200
      isDefault: false
      editable: true
  # Default dashboards
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: UTC
# Alertmanager configuration
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 64Mi
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
    storage:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          storageClassName: csi-hostpath-sc
          resources:
            requests:
              storage: 256Mi
# Node exporter
nodeExporter:
  enabled: true
# Kube state metrics
kubeStateMetrics:
  enabled: true
# Prometheus operator
prometheusOperator:
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # Use cert-manager for admission webhook certs instead of self-signed Job (PreSync hook)
  admissionWebhooks:
    failurePolicy: Ignore
    patch:
      enabled: false
    certManager:
      enabled: true
      issuerRef:
        name: atlas-ca-issuer
        kind: ClusterIssuer
