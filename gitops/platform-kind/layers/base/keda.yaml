apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  project: platform-kind
  source:
    repoURL: 'https://kedacore.github.io/charts'
    chart: keda
    targetRevision: 2.14.0
    helm:
      values: |
        operator:
          replicaCount: 1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

        metricsServer:
          replicaCount: 1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

        webhooks:
          replicaCount: 1
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

        podSecurityContext:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault

        enableClusterAapiAuthV1beta1: true

        logging:
          operator:
            format: json
            level: info
          metricsServer:
            format: json
            level: info

        crds:
          install: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: keda
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
