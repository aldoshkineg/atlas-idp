apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://github.com/aldoshkineg/atlas-idp.git
      targetRevision: main
      path: gitops/platform-kind/layers
      directory:
        recurse: true
        exclude: "{README.md,**/values/**,**/resources/**}"
    - repoURL: https://github.com/aldoshkineg/atlas-idp.git
      targetRevision: main
      path: gitops/workloads
      directory:
        recurse: true
        exclude: "{README.md,**/values/**,**/resources/**}"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
