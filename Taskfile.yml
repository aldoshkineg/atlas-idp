version: "3"

tasks:
  default:
    cmd: go-task --list

  # --- Docker Compose ---
  dc-up:
    desc: Start postgres, redis, minio containers
    cmds:
      - docker compose up -d
    silent: false

  dc-down:
    desc: Stop and remove all containers
    cmds:
      - docker compose down
    silent: false

  dc-logs:
    desc: Follow container logs
    cmds:
      - docker compose logs -f
    silent: false

  dc-ps:
    desc: List running containers
    cmds:
      - docker compose ps
    silent: false

  dc-restart:
    desc: Restart all containers
    cmds:
      - docker compose restart
    silent: false

  # --- Run Services ---
  run-api:
    desc: Start backend API (requires dc-up)
    cmds:
      - go run ./apps/backend-api/cmd
    silent: false

  run-worker:
    desc: Start worker (requires dc-up)
    cmds:
      - go run ./apps/worker/cmd
    silent: false

  # --- Testing ---
  test:
    desc: Run all unit tests
    cmds:
      - go test ./... -race -shuffle=on -count=1
    silent: false

  test-integration:
    desc: Run integration tests (requires dc-up)
    cmds:
      - go test ./... -tags=integration -race -shuffle=on -count=1
    silent: false

  # --- Build ---
  build-api:
    desc: Build backend-api Docker image
    cmds:
      - docker buildx build --platform linux/amd64,linux/arm64 -t ghcr.io/atlas-idp/backend-api:dev apps/backend-api
    silent: false

  build-worker:
    desc: Build worker Docker image
    cmds:
      - docker buildx build --platform linux/amd64,linux/arm64 -t ghcr.io/atlas-idp/worker:dev apps/worker
    silent: false

  kind-load:
    desc: Load dev images into kind cluster
    cmds:
      - kind load docker-image ghcr.io/atlas-idp/backend-api:dev
      - kind load docker-image ghcr.io/atlas-idp/worker:dev
    silent: false

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...
    silent: false
